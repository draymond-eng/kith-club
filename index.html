<style>
  :root{
    --bg:#f4ede1;
    --bg2:#ece2d1;
    --paper:#fffdf8;
    --ink:#241f19;
    --ink2:#3b342b;
    --muted:#8c7f6c;
    --line:#e5dac6;
    --line2:#d7c8ad;
    --rust:#b3543a;
    --rust-d:#8c3f28;
    --forest:#33402f;
    --forest-d:#26301f;
    --gold:#c39a4e;
    --gold-l:#e6c987;
    --good:#4a7a4f;
    --shadow:0 18px 46px rgba(48,38,24,.15);
    --shadow-sm:0 6px 20px rgba(48,38,24,.10);
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--sans);color:var(--ink);background:var(--bg);
    background-image:radial-gradient(1200px 640px at 50% -10%,#faf4ea 0%,var(--bg) 58%);
    min-height:100vh;-webkit-font-smoothing:antialiased;
  }
  a{color:var(--rust-d)}
  button{font-family:inherit;cursor:pointer}
  .hidden{display:none !important}
  h1,h2,h3{font-family:var(--serif);font-weight:600;letter-spacing:.2px}
  .wrap{max-width:660px;margin:0 auto;padding:0 20px}
  .console-wrap{max-width:1060px;margin:0 auto;padding:0 20px}

  /* mark (four-top monoline) */
  .mono{width:46px;height:46px;border-radius:13px;flex:none;position:relative;display:grid;place-items:center;
    background:linear-gradient(155deg,var(--rust),var(--rust-d));box-shadow:var(--shadow-sm)}
  .mono::after{content:"";position:absolute;inset:5px;border:1px solid rgba(255,244,228,.32);border-radius:9px}
  .mono svg{width:62%;height:62%;position:relative;z-index:1}
  .monoc svg{width:66%;height:66%}
  .seal svg{width:50%;height:50%}

  /* buttons */
  .btn{border:none;border-radius:12px;font-size:16px;font-weight:600;padding:15px 24px;letter-spacing:.2px;
    transition:transform .06s ease,filter .15s ease;background:var(--rust);color:#fff;box-shadow:var(--shadow-sm)}
  .btn:hover{filter:brightness(1.05)}
  .btn:active{transform:translateY(1px)}
  .btn[disabled]{opacity:.4;cursor:not-allowed;filter:none}
  .btn.ghost{background:transparent;color:var(--ink);box-shadow:none;border:1.5px solid var(--line2)}
  .btn.ghost:hover{background:#fbf5ea}
  .btn.forest{background:var(--forest)}
  .btn.gold{background:linear-gradient(155deg,var(--gold),#a8823c);color:#2a2113}
  .btn.sm{padding:9px 15px;font-size:14px;border-radius:10px}
  .btn.block{display:block;width:100%}

  /* front door */
  .door{padding:20px 0 64px}
  .door-top{display:flex;align-items:center;justify-content:space-between;padding:38px 0 20px}
  .brand{display:flex;align-items:center;gap:14px}
  .wordmark{font-family:var(--serif);font-size:21px;font-weight:600;line-height:1}
  .wordmark small{display:block;font-family:var(--sans);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-top:5px}
  .door-top .city{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:700}

  .card{background:var(--paper);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:34px 30px;margin-top:20px}
  .rule{height:1px;background:linear-gradient(90deg,transparent,var(--line2),transparent);margin:22px 0}
  .kicker{font-size:11.5px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);}
  .kicker.rustk{color:var(--rust-d)}

  .hero.has-art{padding-top:0;overflow:hidden}
  .hero-art{display:block;width:calc(100% + 60px);margin:-34px -30px 20px;background:linear-gradient(180deg,#fbf3e6,#fffdf8);border-bottom:1px solid var(--line)}
  .hero h1{font-size:37px;line-height:1.1;margin:14px 0 0;letter-spacing:.1px}
  .hero .lede{color:var(--ink2);font-size:16.5px;line-height:1.6;margin:18px 0 0}
  .hero .lede em{color:var(--rust-d);font-style:italic}
  .housecode{margin:20px 0 0;padding:14px 18px;border:1px solid var(--line);border-radius:14px;background:linear-gradient(180deg,#fcf6ea,#fffdf8);text-align:center}
  .housecode .hc-k{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:700}
  .housecode .hc-t{font-family:var(--serif);font-style:italic;font-size:16px;color:var(--rust-d);margin-top:5px}
  .steps3{margin:26px 0 0;counter-reset:s}
  .steps3 .s{display:flex;gap:15px;align-items:flex-start;padding:14px 0;border-top:1px solid var(--line)}
  .steps3 .s:first-child{border-top:none}
  .steps3 .n{flex:none;width:30px;height:30px;border-radius:50%;border:1.5px solid var(--gold);color:var(--rust-d);display:grid;place-items:center;font-family:var(--serif);font-size:15px;font-weight:600;margin-top:1px}
  .steps3 .t{font-size:15.5px;line-height:1.5;color:var(--ink2)}
  .steps3 .t b{color:var(--ink);font-weight:650}
  .ritual-band{margin-top:22px;background:#f3ece0;border:1px solid var(--line);border-radius:12px;padding:11px 15px;font-size:13px;font-weight:600;color:var(--olive-d,#3a4733);display:flex;align-items:center;gap:9px;letter-spacing:.01em}
  .ritual-band .rb-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 3px rgba(195,154,78,.25);flex:none}

  /* form */
  .progress{display:flex;gap:6px;margin:0 0 22px}
  .progress i{flex:1;height:5px;border-radius:99px;background:var(--line2);transition:background .2s}
  .progress i.on{background:var(--rust)}
  .step h2{font-size:26px;margin:8px 0 4px}
  .step .sub{color:var(--muted);font-size:14.5px;line-height:1.55;margin:0 0 22px}
  .field{margin:0 0 19px}
  .field > label{display:block;font-weight:650;font-size:14.5px;margin:0 0 8px}
  .field .hint{color:var(--muted);font-weight:400;font-size:13px;margin-left:2px}
  input[type=text],input[type=email],input[type=datetime-local],input[type=number],textarea,select{
    width:100%;border:1.5px solid var(--line2);background:#fffefb;border-radius:11px;padding:13px 14px;font-size:16px;font-family:inherit;color:var(--ink);transition:border-color .15s,box-shadow .15s}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--rust);box-shadow:0 0 0 3px rgba(179,84,58,.14)}
  textarea{min-height:106px;resize:vertical;line-height:1.55}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  @media(max-width:470px){.two{grid-template-columns:1fr}}
  .chips{display:flex;flex-wrap:wrap;gap:9px}
  .chip{border:1.5px solid var(--line2);background:#fffefb;border-radius:999px;padding:10px 16px;font-size:14.5px;font-weight:600;color:var(--ink);transition:all .12s;user-select:none}
  .chip:hover{border-color:var(--rust)}
  .chip.on{background:var(--rust);border-color:var(--rust);color:#fff}
  .chip.forest.on{background:var(--forest);border-color:var(--forest)}
  .chips.tags{gap:7px}
  .chip.tag{padding:7px 12px;font-size:13.5px;font-weight:600}
  .chip.tag.on{background:var(--forest);border-color:var(--forest)}
  .slider-row{display:flex;align-items:center;gap:14px;margin-top:4px}
  .slider-row output{font-weight:700;color:var(--rust-d);min-width:34px;text-align:right;font-variant-numeric:tabular-nums}
  input[type=range]{-webkit-appearance:none;appearance:none;height:7px;border-radius:99px;flex:1;background:linear-gradient(90deg,var(--forest),var(--gold),var(--rust));cursor:pointer}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:25px;height:25px;border-radius:50%;background:#fff;border:3px solid var(--rust);box-shadow:var(--shadow-sm)}
  input[type=range]::-moz-range-thumb{width:21px;height:21px;border-radius:50%;background:#fff;border:3px solid var(--rust)}
  .scale-ends{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:6px}
  .nav{display:flex;gap:12px;margin-top:6px}
  .nav .btn{flex:1}
  .nav .btn.ghost{flex:0 0 auto;min-width:92px}

  .review dl{margin:0}
  .review .rrow{padding:13px 0;border-bottom:1px solid var(--line)}
  .review .rrow:last-child{border-bottom:none}
  .review dt{font-size:11.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .review dd{margin:6px 0 0;font-size:15.5px;line-height:1.55;white-space:pre-wrap}

  .done{text-align:center;padding:46px 28px}
  .done .seal{width:78px;height:78px;border-radius:50%;border:1.5px solid var(--gold);color:var(--rust-d);display:grid;place-items:center;margin:0 auto 20px;font-size:34px;font-family:var(--serif)}
  .done h2{font-size:28px;margin:0 0 10px}
  .done p{color:var(--ink2);font-size:16px;line-height:1.6;margin:0 auto;max-width:440px}
  .done-actions{display:flex;flex-direction:column;gap:10px;margin-top:24px}
  .done-actions .btn{text-decoration:none;text-align:center}
  /* couple's home */
  .timeline{display:flex;align-items:center;margin:22px 0 4px}
  .tl-step{display:flex;flex-direction:column;align-items:center;gap:7px;flex:none}
  .tl-step .dot{width:15px;height:15px;border-radius:50%;background:var(--line2);border:2px solid var(--line2);transition:all .2s}
  .tl-step .lbl{font-size:11px;font-weight:700;letter-spacing:.03em;color:var(--muted);text-transform:uppercase;white-space:nowrap}
  .tl-step.on .dot{background:var(--rust);border-color:var(--rust)}
  .tl-step.on .lbl{color:var(--ink)}
  .tl-step.now .dot{background:var(--gold);border-color:var(--gold);box-shadow:0 0 0 4px rgba(195,154,78,.22)}
  .tl-bar{flex:1;height:2px;background:var(--line2);margin:0 6px;position:relative;top:-11px}
  .memcard{display:flex;align-items:center;gap:14px;background:linear-gradient(150deg,#3c4a35,#26301f);border-radius:16px;padding:16px 18px;box-shadow:0 10px 24px rgba(38,38,24,.18)}
  .memcard .mc-key{width:44px;height:44px;flex:none;background:rgba(255,255,255,.08);border-radius:11px;display:grid;place-items:center}
  .memcard .mc-key svg{width:60%;height:60%}
  .memcard .mc-tier{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-l);font-weight:700}
  .memcard .mc-name{font-family:var(--serif);font-size:19px;color:#fffdf8;margin-top:2px;line-height:1.1}
  .memcard .mc-club{font-size:12px;color:#aeb6a2;margin-top:2px;letter-spacing:.02em}
  .home-next,.home-idle,.home-refer{padding:2px 0}
  .home-intro{background:var(--paper);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:12px;padding:14px 16px;margin:0 0 10px}
  .home-intro .pn{font-weight:650;font-size:15.5px}
  .countdown{display:inline-block;background:var(--forest);color:#f2eadc;font-family:var(--serif);font-size:15px;font-weight:600;padding:6px 16px;border-radius:999px;margin:2px 0 6px;letter-spacing:.02em}
  .coming{margin-top:20px;background:#faf3e6;border:1px solid var(--line);border-radius:14px;padding:15px 16px}
  .coming .lbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .coming-row{font-family:var(--serif);font-size:16px;color:var(--ink);padding:5px 0;border-bottom:1px solid var(--line)}
  .coming-row:last-of-type{border-bottom:none}
  .coming-note{font-size:12px;color:var(--muted);margin-top:10px;font-style:italic}
  .rate-row{display:flex;gap:9px;flex-wrap:wrap}
  .foot{text-align:center;color:var(--muted);font-size:12.5px;padding:30px 0 26px;line-height:1.7}
  .foot a{color:var(--muted);text-decoration:underline}

  /* splash */
  .splash{position:fixed;inset:0;z-index:100;display:grid;place-items:center;padding:24px;background:radial-gradient(900px 560px at 50% 8%,#3c4a35 0%,#2a3323 55%,#20281b 100%);animation:sfade .35s ease}
  @keyframes sfade{from{opacity:0}to{opacity:1}}
  .splash-card{max-width:500px;width:100%;text-align:center;color:#f2eadc}
  .splash .mono{margin:0 auto 24px;width:54px;height:54px}
  .splash .kicker{color:var(--gold-l)}
  .splash h1{font-family:var(--serif);font-size:40px;line-height:1.08;margin:16px 0 0;color:#fffdf8;font-weight:600}
  .splash .defline{font-family:var(--serif);font-size:15px;color:var(--gold-l);margin:16px auto 0;letter-spacing:.02em}
  .splash .defline i{font-style:italic;opacity:.85}
  .splash .deck{font-family:var(--serif);font-style:italic;font-size:19px;color:var(--gold-l);margin:14px auto 0;letter-spacing:.01em}
  .splash .thin{width:52px;height:1px;background:var(--gold);margin:22px auto 0;opacity:.7}
  .splash .sub{color:#cdd2c1;font-size:16px;line-height:1.62;margin:22px auto 0;max-width:430px}
  .splash .sub b{color:#f0e7d3;font-weight:600}
  .splash .btn{margin-top:30px;padding:15px 40px}
  .splash .how-line{color:var(--gold-l);font-size:13px;letter-spacing:.02em;margin:16px auto 0;font-family:var(--serif)}
  .splash .venue{color:#cdd2c1;font-size:13px;line-height:1.5;margin:20px auto 0;max-width:410px;padding:12px 16px;border:1px solid rgba(198,163,90,.4);border-radius:12px}
  .splash .venue b{color:var(--gold-l);font-weight:600}
  .splash .fine{color:#939c86;font-size:12px;margin-top:18px;letter-spacing:.02em}
  @media(max-width:470px){.splash h1{font-size:31px}}

  /* console */
  .cbar{background:var(--forest);color:#f2eadc;border-bottom:2px solid var(--gold)}
  .cbar-in{max-width:1060px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:16px;justify-content:space-between;flex-wrap:wrap}
  .cbar .brandc{display:flex;align-items:center;gap:12px;font-family:var(--serif);font-size:17px}
  .cbar .monoc{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.12);display:grid;place-items:center;font-family:var(--serif);font-size:14px;color:#fdf3e6;letter-spacing:1px}
  .tabs{display:flex;gap:3px;background:rgba(0,0,0,.16);border-radius:12px;padding:4px}
  .tabs button{background:transparent;border:none;color:#dfe6d5;font-weight:650;font-size:13.5px;padding:8px 15px;border-radius:9px}
  .tabs button.on{background:#fffdf8;color:var(--forest-d)}
  .cbar .who{font-size:12px;opacity:.85;display:flex;align-items:center;gap:10px}
  .cbar .who a{color:#fff}

  .panel{margin-top:24px;padding-bottom:60px}
  .panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .panel-head h2{font-size:23px;margin:0}
  .panel-head .count{color:var(--muted);font-size:13px}

  table.list{width:100%;border-collapse:collapse;background:var(--paper);border-radius:15px;overflow:hidden;box-shadow:var(--shadow-sm);border:1px solid var(--line)}
  table.list th{text-align:left;font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);font-weight:700;padding:13px 16px;border-bottom:1px solid var(--line);background:#faf3e6}
  table.list td{padding:14px 16px;border-bottom:1px solid var(--line);font-size:15px;vertical-align:middle}
  table.list tr:last-child td{border-bottom:none}
  table.list tbody tr{cursor:pointer;transition:background .1s}
  table.list tbody tr:hover{background:#faf3e6}
  .cn{font-weight:650}
  .sub2{color:var(--muted);font-size:12.5px}

  .badge{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.04em;padding:4px 11px;border-radius:999px;text-transform:capitalize}
  .b-new{background:#e7efdf;color:var(--forest-d)}
  .b-invited{background:#e0ecf3;color:#2f6a8a}
  .b-attended{background:#f3e9d0;color:#8a6a24}
  .b-paired{background:#e6ddef;color:#6b4a8a}
  .b-passed{background:#eee3df;color:#8a5a4a}
  .b-proposed{background:#eef1e9;color:var(--forest-d)}
  .b-confirmed{background:#e0ecf3;color:#2f6a8a}
  .b-happened{background:#f3e9d0;color:#8a6a24}
  .b-fizzled{background:#eee1de;color:#9a5040}
  .b-upcoming{background:#e0ecf3;color:#2f6a8a}

  .empty{background:var(--paper);border:1px dashed var(--line2);border-radius:18px;padding:46px 26px;text-align:center;color:var(--muted)}
  .empty h3{color:var(--ink);margin:0 0 6px;font-size:19px}

  .grid-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:680px){.grid-cards{grid-template-columns:1fr}}
  .ecard{background:var(--paper);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow-sm);padding:18px 20px;cursor:pointer;transition:transform .07s,box-shadow .15s}
  .ecard:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
  .ecard h3{margin:0;font-size:19px}
  .ecard .meta{color:var(--muted);font-size:13.5px;margin:8px 0 0;line-height:1.5}
  .ecard .rosterline{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:13px;border-top:1px solid var(--line)}
  .ecard .avstack{display:flex}
  .ecard .av{width:26px;height:26px;border-radius:50%;background:var(--bg2);border:2px solid var(--paper);margin-left:-7px;display:grid;place-items:center;font-size:11px;font-weight:700;color:var(--rust-d)}
  .ecard .av:first-child{margin-left:0}

  /* drawer */
  .scrim{position:fixed;inset:0;background:rgba(36,31,25,.44);backdrop-filter:blur(2px);z-index:40;display:flex;justify-content:flex-end}
  .drawer{width:min(580px,100%);background:var(--bg);height:100%;overflow-y:auto;box-shadow:-14px 0 40px rgba(0,0,0,.22);animation:slidein .22s ease}
  @keyframes slidein{from{transform:translateX(30px);opacity:.4}to{transform:none;opacity:1}}
  .drawer-head{position:sticky;top:0;background:var(--paper);border-bottom:1px solid var(--line);padding:18px 22px;display:flex;align-items:center;justify-content:space-between;z-index:2}
  .drawer-head h2{margin:0;font-size:21px}
  .x{border:none;background:#f0e6d5;width:36px;height:36px;border-radius:10px;font-size:18px;color:var(--ink)}
  .drawer-body{padding:22px}
  .kv{margin:0 0 17px}
  .kv .k{font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted)}
  .kv .v{margin-top:4px;font-size:15.5px;line-height:1.55;white-space:pre-wrap}
  .open-answer{background:#faf3e6;border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:12px;padding:15px 16px;margin:0 0 14px}
  .open-answer .k{color:var(--rust-d)}
  .posture{display:flex;align-items:center;gap:10px;margin-top:6px}
  .posture .bar{flex:1;height:8px;border-radius:99px;background:var(--line2);position:relative;overflow:hidden}
  .posture .bar span{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--forest),var(--rust));border-radius:99px}
  .posture .num{font-variant-numeric:tabular-nums;font-weight:700;color:var(--rust-d);min-width:30px;text-align:right}
  .sect-title{font-family:var(--serif);font-size:13px;color:var(--muted);margin:26px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--line);text-transform:uppercase;letter-spacing:.09em;font-weight:700}
  .savebar{position:sticky;bottom:0;background:var(--paper);border-top:1px solid var(--line);padding:14px 22px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .savebar select{max-width:170px}
  .saved-note{color:var(--good);font-size:13px;font-weight:600;opacity:0;transition:opacity .2s}
  .saved-note.show{opacity:1}

  /* roster rows */
  .roster-row{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin:0 0 10px}
  .roster-row .top{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .roster-row .pn{font-weight:650;font-size:15px}
  .toggle{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;user-select:none}
  .toggle .sw{width:40px;height:23px;border-radius:99px;background:var(--line2);position:relative;transition:background .15s}
  .toggle .sw::after{content:"";position:absolute;width:19px;height:19px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left .15s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .toggle.on .sw{background:var(--good)}
  .toggle.on .sw::after{left:19px}
  .toggle.on{color:var(--good)}
  .likes-wrap{margin-top:12px;padding-top:12px;border-top:1px dashed var(--line2)}
  .likes-wrap .lbl{font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  .minichip{border:1.5px solid var(--line2);background:#fffefb;border-radius:999px;padding:6px 12px;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;transition:all .12s}
  .minichip:hover{border-color:var(--rust)}
  .minichip.on{background:var(--rust);border-color:var(--rust);color:#fff}
  .minichip.mutual{background:var(--forest);border-color:var(--forest);color:#fff}
  .rlinks{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:11px}
  .rsvp{font-size:10.5px;font-weight:700;letter-spacing:.03em;padding:3px 9px;border-radius:999px}
  .rsvp.yes{background:#e7efdf;color:var(--good)}
  .rsvp.no{background:#eee1de;color:#9a5040}
  .rsvp.none{background:#efe7d6;color:var(--muted)}
  .linkbtn{border:1px solid var(--line2);background:#fffefb;border-radius:8px;font-size:12px;font-weight:600;color:var(--ink2);padding:5px 10px;cursor:pointer}
  .linkbtn:hover{border-color:var(--rust);color:var(--rust-d)}
  .suggest-row{background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin:0 0 8px}
  .suggest-row .srtop{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .suggest-row .pn{font-weight:600;font-size:14.5px}
  .suggest-row .vs{color:var(--gold)}
  .score{font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 9px;border-radius:999px;white-space:nowrap}
  .s-strong{background:#e7efdf;color:var(--forest-d)}
  .s-promising{background:#f3e9d0;color:#8a6a24}
  .s-worth{background:#efe7d6;color:var(--muted)}

  /* pairing */
  .match-card{background:var(--paper);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow-sm);padding:18px 20px;margin:0 0 13px}
  .match-card .pairline{display:flex;align-items:center;gap:12px;font-family:var(--serif);font-size:18px;font-weight:600;flex-wrap:wrap}
  .match-card .vs{color:var(--gold);font-size:20px}
  .match-card .mutual-tag{display:inline-block;background:#e7efdf;color:var(--forest-d);font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:4px 10px;border-radius:999px;margin-left:auto}
  .match-card .why{color:var(--muted);font-size:13.5px;margin:10px 0 0;line-height:1.5}
  .match-card .act{margin-top:14px}
  .mm-controls{display:flex;gap:18px;align-items:center;flex-wrap:wrap;margin:0 0 18px;background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:12px 16px}
  .mm-controls .mm-focus{font-size:13.5px;font-weight:600;color:var(--ink2);display:flex;align-items:center;gap:8px}
  .mm-controls select{width:auto;min-width:190px;padding:8px 11px;font-size:14px}
  .mm-controls .mm-toggle{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:7px;cursor:pointer}
  .mm-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .mm-score{display:flex;flex-direction:column;align-items:center;line-height:1;border-radius:12px;padding:8px 12px;min-width:64px;text-align:center}
  .mm-score b{font-family:var(--serif);font-size:24px;font-weight:600}
  .mm-score span{font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-top:3px;opacity:.85}
  .mm-score.s-strong{background:#e7efdf;color:var(--forest-d)}
  .mm-score.s-promising{background:#f3e9d0;color:#8a6a24}
  .mm-score.s-worth{background:#efe7d6;color:var(--muted)}
  .mm-meta{color:var(--muted);font-size:12.5px;margin:8px 0 0}
  .seg{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.03em;padding:2px 8px;border-radius:999px;background:#eef1e9;color:var(--forest-d);vertical-align:middle;margin-left:6px}
  .mm-plan{background:#faf3e6;border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:10px;padding:10px 12px;margin:12px 0 0;font-size:13px;line-height:1.5}
  .mm-plan b{color:var(--rust-d)}
  .tcard .suggest{background:#faf3e6;border-radius:9px;padding:8px 10px;font-size:12px;margin:8px 0 0;line-height:1.45;color:var(--ink2)}
  .tcard .nudge{display:inline-block;background:#fbeee6;color:#9a5040;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;margin-top:8px}
  .mm-block{margin:10px 0 0;font-size:13px;color:var(--bad);font-weight:600}
  .mm-reasons{display:flex;flex-wrap:wrap;gap:7px;margin:12px 0 0}
  .rchip{background:#f2ede2;border-radius:999px;padding:5px 11px;font-size:12.5px;font-weight:600;color:var(--ink2)}
  .mm-flags{margin:10px 0 0;display:flex;flex-direction:column;gap:5px}
  .fchip{background:#fbeee6;border:1px solid #e6d4c4;border-radius:9px;padding:6px 10px;font-size:12.5px;color:#8a5a3a;line-height:1.4}
  .mm-act{margin-top:14px;display:flex;gap:8px;flex-wrap:wrap}
  .match-card.mm-blocked{opacity:.62}
  .mb-row{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
  .mb-sizes{font-size:13px;font-weight:600;color:var(--ink2);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .mb-size{border:1.5px solid var(--line2);background:#fffefb;width:34px;height:34px;border-radius:9px;font-weight:700;color:var(--ink)}
  .mb-size.on{background:var(--forest);border-color:var(--forest);color:#fff}
  .mb-size[disabled]{opacity:.35;cursor:not-allowed}
  .mb-couples{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:0 0 16px}
  @media(max-width:460px){.mb-couples{grid-template-columns:1fr}}
  .mb-couple{background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:11px 13px}
  .mb-couple .pn{font-weight:650;font-size:14.5px}
  .mb-why{background:#faf3e6;border:1px solid var(--line);border-radius:12px;padding:13px 15px}
  .mb-why .lbl{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:9px}

  /* board */
  .board{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:start}
  @media(max-width:940px){.board{grid-template-columns:1fr 1fr}}
  @media(max-width:580px){.board{grid-template-columns:1fr}}
  .col{background:var(--bg2);border-radius:15px;padding:6px}
  .col > h3{font-size:12px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin:11px 12px;display:flex;justify-content:space-between}
  .tcard{background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:14px;margin:8px 4px;box-shadow:var(--shadow-sm)}
  .tcard .couples{font-weight:650;font-size:15px;line-height:1.4}
  .tcard .plan{color:var(--muted);font-size:13px;margin:7px 0 0;line-height:1.5}
  .tcard .plan b{color:var(--ink);font-weight:600}
  .tcard .from{font-size:11.5px;color:var(--gold);font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-top:8px}
  .tcard .tnote{background:#faf3e6;border-radius:9px;padding:9px 11px;font-size:13px;margin:10px 0 0;line-height:1.5;white-space:pre-wrap}
  .tcard .actions{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap}
  .tcard .actions button{font-size:12.5px;padding:7px 11px;border-radius:9px}

  .modal-scrim{position:fixed;inset:0;background:rgba(36,31,25,.44);z-index:50;display:grid;place-items:center;padding:18px}
  .modal{background:var(--bg);border-radius:20px;max-width:540px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow)}
  .modal-head{padding:22px 24px 0}
  .modal-head h2{margin:0;font-size:22px}
  .modal-head p{color:var(--muted);font-size:14px;margin:6px 0 0;line-height:1.5}
  .modal-body{padding:18px 24px 24px}
  .pick{border:1.5px solid var(--line2);border-radius:12px;padding:12px 14px;margin:0 0 9px;display:flex;align-items:center;gap:12px;cursor:pointer;background:#fffefb;transition:all .12s}
  .pick:hover{border-color:var(--rust)}
  .pick.on{border-color:var(--rust);background:#fdf1e9}
  .pick .box{width:22px;height:22px;border-radius:7px;border:2px solid var(--line2);flex:none;display:grid;place-items:center;color:#fff;font-size:13px}
  .pick.on .box{background:var(--rust);border-color:var(--rust)}
  .pick .pn{font-weight:600;font-size:15px}

  .login-wrap{max-width:430px;margin:0 auto;padding:76px 20px}
  .login-card{background:var(--paper);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:36px 30px;text-align:center}
  .login-card .mono{margin:0 auto 18px}
  .login-card h1{font-size:26px;margin:0 0 6px}
  .login-card p{color:var(--muted);font-size:14.5px;line-height:1.55;margin:0 0 24px}
  .login-card .field{text-align:left}
  .note{font-size:12.5px;color:var(--muted);margin-top:16px;line-height:1.55}
  .link-btn{background:none;border:none;color:var(--rust-d);font-weight:600;text-decoration:underline;font-size:13px;padding:0}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:13px 22px;border-radius:12px;font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:all .25s;z-index:120;box-shadow:var(--shadow)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .fb-note-row{margin-top:8px;font-family:var(--serif);font-style:italic;font-size:13.5px;color:var(--rust-d);line-height:1.45;background:#f9f0dd;border:1px solid #e3caa0;border-radius:10px;padding:8px 12px}

  /* ---- Add to home screen nudge ---- */
  .a2hs{display:flex;align-items:flex-start;gap:12px;position:relative;margin-top:18px;padding:14px 16px;border:1px solid var(--line);border-radius:14px;background:linear-gradient(180deg,#fcf6ea,#fffdf8)}
  .a2hs .a2hs-key{width:38px;height:38px;flex:none;border-radius:10px;background:linear-gradient(155deg,#3c4a35,#26301f);display:grid;place-items:center}
  .a2hs .a2hs-key svg{width:60%;height:60%}
  .a2hs .a2hs-t{font-weight:650;font-size:14.5px}
  .a2hs .a2hs-s{font-size:13px;color:var(--muted);line-height:1.5;margin-top:3px}
  .a2hs .a2hs-s b{color:var(--ink);font-weight:650}
  .a2hs .a2hs-btn{margin-top:9px;font-size:13px;font-weight:650;background:var(--forest);color:#f2eadc;border:none;border-radius:9px;padding:8px 14px;cursor:pointer}

<script>
/* ============================================================

   ============================================================ */
const SUPABASE_URL = "https://rgerocvguasibggawchr.supabase.co";

/* ---- The supper: venue + paid reservation ----
   VENUE is the private members club that hosts each Fourtop supper.
   PRICE is what a couple pays to reserve their two seats.
   PAY_URL: paste your Stripe Payment Link here (Dashboard -> Payment Links
   -> create a link for the couple price). When set, "Reserve our seats"
   sends the couple to Stripe to pay; when blank, it still holds the RSVP
   and tells them payment details are coming by email. */
const VENUE_NAME  = "Three Cities Social";
const VENUE_LINE  = "a private members club";
const PRICE_LABEL = "$75 / couple";        // founding rate for the first two suppers; change to "$110 / couple" after
const PRICE_TAG   = "Founding rate";        // small badge by the price; set to "" once the founding suppers are done
const PRICE_INCLUDES = "dinner and a welcome drink for the two of you";
const PAY_URL = "https://buy.stripe.com/8x23cvcOk7LtahD7fq8Zq0H"; // Stripe Payment Link
const MEMBER_TIER = "Founding Member"; // shown on each couple's home card; change to "Member" after the founding season

/* helpers */
const $ = (sel, root=document) => root.querySelector(sel);
const el = (html) => { const t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstChild; };
const esc = (s) => (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid = () => 'a'+Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4);
const nowISO = () => new Date().toISOString();
const initials = (name) => (name||'?').split(/[\s&]+/).filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove('show'),2200); }

/* Fourtop mark — a refined vintage skeleton key */
function markSVG(color){ return `<svg viewBox="0 0 100 100" fill="none"><g fill="${color}"><path fill-rule="evenodd" clip-rule="evenodd" d="M46 10 a18 18 0 1 1 0 36 a18 18 0 1 1 0 -36 Z M46 22 a6 6 0 1 0 0 12 a6 6 0 1 0 0 -12 Z"/><rect x="42.5" y="42" width="7" height="46" rx="2.5"/><rect x="49.5" y="70" width="12" height="6.5" rx="1.6"/><rect x="49.5" y="80.5" width="8" height="6.5" rx="1.6"/></g></svg>`; }
const MARK_CREAM = markSVG('#fff6ea');
const MARK_RUST  = markSVG('#b3543a');
function setFavicon(){
  const svg = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%2333402f'/>`
    + `<g fill='%23e6c987'><path fill-rule='evenodd' d='M46 14 a16 16 0 1 1 0 32 a16 16 0 1 1 0 -32 Z M46 24 a6 6 0 1 0 0 12 a6 6 0 1 0 0 -12 Z'/><rect x='42.5' y='44' width='7' height='42' rx='2.5'/><rect x='49.5' y='68' width='11' height='6' rx='1.5'/><rect x='49.5' y='77.5' width='7.5' height='6' rx='1.5'/></g></svg>`;
  let link=document.querySelector("link[rel='icon']"); if(!link){ link=document.createElement('link'); link.rel='icon'; document.head.appendChild(link); }
  link.type='image/svg+xml'; link.href="data:image/svg+xml,"+svg.replace(/</g,'%3C').replace(/>/g,'%3E').replace(/#/g,'%23').replace(/ /g,'%20');
}
function fmtDate(iso){ if(!iso) return '–'; const d=new Date(iso); return d.toLocaleString(undefined,{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}); }
function fmtDay(iso){ if(!iso) return 'no date set'; const d=new Date(iso); return d.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'}); }
function timeAgo(iso){ const s=(Date.now()-new Date(iso).getTime())/1000; if(s<60)return'just now'; if(s<3600)return Math.floor(s/60)+'m ago'; if(s<86400)return Math.floor(s/3600)+'h ago'; return Math.floor(s/86400)+'d ago'; }

/* ============================================================ DB ============================================================ */
const DB = (() => {
  const AKEY='t4_applications', TKEY='t4_tables', EKEY='t4_events', SEEDED='t4_seeded_chi_v1';
  const ls = {
    _read(k){ try{ return JSON.parse(localStorage.getItem(k)||'[]'); }catch(e){ return []; } },
    _write(k,v){ localStorage.setItem(k, JSON.stringify(v)); },
    async listApplications(){ return this._read(AKEY).sort((a,b)=> b.created_at.localeCompare(a.created_at)); },
    async insertApplication(row){ const r={...row,id:uid(),created_at:nowISO(),status:row.status||'new'}; const all=this._read(AKEY); all.push(r); this._write(AKEY,all); return r; },
    async updateApplication(id,patch){ const all=this._read(AKEY); const i=all.findIndex(x=>x.id===id); if(i>=0){ all[i]={...all[i],...patch}; this._write(AKEY,all); return all[i]; } },
    async listTables(){ return this._read(TKEY).sort((a,b)=> b.created_at.localeCompare(a.created_at)); },
    async insertTable(row){ const r={...row,id:uid(),created_at:nowISO()}; const all=this._read(TKEY); all.push(r); this._write(TKEY,all); return r; },
    async updateTable(id,patch){ const all=this._read(TKEY); const i=all.findIndex(x=>x.id===id); if(i>=0){ all[i]={...all[i],...patch}; this._write(TKEY,all); return all[i]; } },
    async listEvents(){ return this._read(EKEY).sort((a,b)=> (b.scheduled_at||'').localeCompare(a.scheduled_at||'')); },
    async insertEvent(row){ const r={...row,id:uid(),created_at:nowISO(),roster:row.roster||[]}; const all=this._read(EKEY); all.push(r); this._write(EKEY,all); return r; },
    async updateEvent(id,patch){ const all=this._read(EKEY); const i=all.findIndex(x=>x.id===id); if(i>=0){ all[i]={...all[i],...patch}; this._write(EKEY,all); return all[i]; } },
    async invitePublic(eventId, token){
      const apps=this._read(AKEY), events=this._read(EKEY);
      const me=apps.find(a=>a.token===token), ev=events.find(e=>e.id===eventId);
      if(!me||!ev) return null;
      const roster=arr(ev.roster), happened=ev.status==='happened', mine=roster.find(r=>r.couple_id===me.id)||{};
      const others=roster.filter(r=>r.couple_id!==me.id).map(r=>{ const a=apps.find(x=>x.id===r.couple_id); if(!a) return null;
        return { couple_id:a.id, couple_name:happened?a.couple_name:null, neighborhood:a.neighborhood, teaser:coupleTeaser(a), rsvp:r.rsvp||null }; }).filter(Boolean);
      return { event:{id:ev.id,title:ev.title,venue:ev.venue,scheduled_at:ev.scheduled_at,status:ev.status},
        me:{couple_id:me.id,partner1:me.partner1_name,partner2:me.partner2_name},
        mine:{rsvp:mine.rsvp||null,likes:arr(mine.likes),rating:mine.rating||null}, others };
    },
    async setRsvp(eventId, token, val){
      const apps=this._read(AKEY), events=this._read(EKEY);
      const me=apps.find(a=>a.token===token), ei=events.findIndex(e=>e.id===eventId); if(!me||ei<0) return;
      const roster=arr(events[ei].roster); let r=roster.find(x=>x.couple_id===me.id); if(!r){ r={couple_id:me.id,attended:false,likes:[]}; roster.push(r); }
      r.rsvp=val; events[ei].roster=roster; this._write(EKEY,events);
      if(val==='yes'){ const ai=apps.findIndex(a=>a.id===me.id); if(ai>=0&&(apps[ai].status==='new'||apps[ai].status==='invited')){ apps[ai].status='invited'; this._write(AKEY,apps); } }
    },
    async submitPicks(eventId, token, likes, rating){
      const apps=this._read(AKEY), events=this._read(EKEY);
      const me=apps.find(a=>a.token===token), ei=events.findIndex(e=>e.id===eventId); if(!me||ei<0) return;
      const roster=arr(events[ei].roster); let r=roster.find(x=>x.couple_id===me.id); if(!r){ r={couple_id:me.id,attended:true,likes:[]}; roster.push(r); }
      r.likes=arr(likes); r.attended=true; r.rsvp=r.rsvp||'yes'; r.rating=rating||''; events[ei].roster=roster; this._write(EKEY,events);
      const ai=apps.findIndex(a=>a.id===me.id); if(ai>=0&&apps[ai].status!=='paired'){ apps[ai].status='attended'; this._write(AKEY,apps); }
    },
    async submitFeedback(eventId, token, note){
      const apps=this._read(AKEY), events=this._read(EKEY);
      const me=apps.find(a=>a.token===token), ei=events.findIndex(e=>e.id===eventId); if(!me||ei<0) return;
      const roster=arr(events[ei].roster); let r=roster.find(x=>x.couple_id===me.id); if(!r){ r={couple_id:me.id,attended:true,likes:[]}; roster.push(r); }
      r.feedback=note; events[ei].roster=roster; this._write(EKEY,events);
    },
    async coupleHome(token){
      const apps=this._read(AKEY); const me=apps.find(a=>a.token===token); if(!me) return null;
      const events=this._read(EKEY), tables=this._read(TKEY);
      const upcoming=events.filter(e=>e.status==='upcoming'&&arr(e.roster).some(r=>r.couple_id===me.id)).sort((a,b)=>(a.scheduled_at||'').localeCompare(b.scheduled_at||''))[0]||null;
      const intros=tables.filter(t=>arr(t.couple_ids).includes(me.id)).map(t=>({ status:t.status, place:t.place, scheduled_at:t.scheduled_at, format:t.format,
        others:arr(t.couple_ids).filter(id=>id!==me.id).map(id=>{const a=apps.find(x=>x.id===id);return a?a.couple_name:'a couple';}) }));
      return { couple_name:me.couple_name, partner1:me.partner1_name, partner2:me.partner2_name, status:me.status,
        upcoming: upcoming?{title:upcoming.title, venue:upcoming.venue, scheduled_at:upcoming.scheduled_at, event_id:upcoming.id}:null, intros, token:me.token };
    },
    seedIfEmpty(){
      if(localStorage.getItem(SEEDED)) return;
      const apps=[];
      SEED.forEach((s,i)=>{ apps.push({...s,id:uid(),token:makeToken(),email:'',created_at:new Date(Date.now()-(SEED.length-i)*3600e3*11).toISOString()}); });
      this._write(AKEY,apps);
      // one past mixer with recorded attendance + likes (a mutual pair to demo Pairing)
      const [a0,a1,a2,a3]=apps; // Alvarez-Kims, Jordan&Priya, Osei, Sam&Theo
      const past={ id:uid(), created_at:nowISO(), title:'The Winter Table',
        venue:'Three Cities Social', scheduled_at:new Date(Date.now()-6*86400e3).toISOString(),
        capacity:12, status:'happened', notes:'First Chicago cohort. Great energy, two clear sparks.',
        roster:[
          {couple_id:a0.id, attended:true, rsvp:'yes', likes:[a1.id]},
          {couple_id:a1.id, attended:true, rsvp:'yes', likes:[a0.id, a2.id]}, // a0<->a1 mutual
          {couple_id:a2.id, attended:true, rsvp:'yes', likes:[]},
          {couple_id:a3.id, attended:true, rsvp:'yes', likes:[]},
        ]};
      const upcoming={ id:uid(), created_at:nowISO(), title:'Spring Supper Club, mixer no. 2',
        venue:'Three Cities Social', scheduled_at:new Date(Date.now()+12*86400e3).toISOString(),
        capacity:12, status:'upcoming', notes:'', roster:[] };
      this._write(EKEY,[past,upcoming]);
      // reflect statuses: attendees -> attended
      apps.forEach(a=>{ if([a0.id,a1.id,a2.id,a3.id].includes(a.id)) a.status='attended'; });
      this._write(AKEY,apps);
      localStorage.setItem(SEEDED,'1');
    }
  };
  let sb=null;
  const remote = {
    async _client(){ if(sb) return sb; await loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js'); sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY); return sb; },
    async _q(fn){ const c=await this._client(); const {data,error}=await fn(c); if(error)throw error; return data; },
    async listApplications(){ return this._q(c=>c.from('applications').select('*').order('created_at',{ascending:false})); },
    async insertApplication(row){ return this._q(c=>c.from('applications').insert([row])); }, // no .select(): public front door has insert-only, cannot read back
    async updateApplication(id,patch){ return this._q(c=>c.from('applications').update(patch).eq('id',id).select().single()); },
    async listTables(){ return this._q(c=>c.from('tables').select('*').order('created_at',{ascending:false})); },
    async insertTable(row){ return this._q(c=>c.from('tables').insert([row]).select().single()); },
    async updateTable(id,patch){ return this._q(c=>c.from('tables').update(patch).eq('id',id).select().single()); },
    async listEvents(){ return this._q(c=>c.from('events').select('*').order('scheduled_at',{ascending:false})); },
    async insertEvent(row){ return this._q(c=>c.from('events').insert([row]).select().single()); },
    async updateEvent(id,patch){ return this._q(c=>c.from('events').update(patch).eq('id',id).select().single()); },
    seedIfEmpty(){},
    async magicLink(email){ const c=await this._client(); return c.auth.signInWithOtp({email, options:{emailRedirectTo:location.origin+location.pathname}}); },
    async passwordSignIn(email,password){ const c=await this._client(); const {data,error}=await c.auth.signInWithPassword({email,password}); if(error)throw error; return data.session; },
    async session(){ const c=await this._client(); const {data}=await c.auth.getSession(); return data.session; },
    async signOut(){ const c=await this._client(); return c.auth.signOut(); },
    async coupleHome(token){ const c=await this._client(); const {data,error}=await c.rpc('couple_home',{p_token:token}); if(error)throw error; return data; },
    async invitePublic(eventId, token){ const c=await this._client(); const {data,error}=await c.rpc('event_invite',{p_event_id:eventId,p_token:token}); if(error)throw error; return data; },
    async setRsvp(eventId, token, val){ const c=await this._client(); const {error}=await c.rpc('set_rsvp',{p_event_id:eventId,p_token:token,p_rsvp:val}); if(error)throw error; },
    async submitPicks(eventId, token, likes, rating){ const c=await this._client(); const {error}=await c.rpc('submit_picks',{p_event_id:eventId,p_token:token,p_likes:likes,p_rating:rating||''}); if(error)throw error; },
    async submitFeedback(eventId, token, note){ const c=await this._client(); const {error}=await c.rpc('submit_feedback',{p_event_id:eventId,p_token:token,p_note:note||''}); if(error)throw error; },
  };
  return USE_SUPABASE ? remote : ls;
})();
function loadScript(src){ return new Promise((res,rej)=>{ const s=document.createElement('script'); s.src=src; s.onload=res; s.onerror=rej; document.head.appendChild(s); }); }

function route(){
  const h = location.hash.replace(/^#\/?/,'');
  if(h.startsWith('console')) renderConsole();
  else if(h.startsWith('invite/')) renderInvite(h.split('/').slice(1));
  else if(h.startsWith('picks/')) renderPicks(h.split('/').slice(1));
  else if(h.startsWith('home/')) renderHome(h.split('/')[1].split('?')[0]);
  else renderDoor();
}

let deferredInstall=null;

function isStandalone(){ return (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone===true; }
function isMobileUA(){ return /iPhone|iPad|iPod|Android/i.test(navigator.userAgent||''); }
function isIOSUA(){ return /iPhone|iPad|iPod/i.test(navigator.userAgent||''); }
function a2hsCard(){
  if(isStandalone() || !isMobileUA() || localStorage.getItem('t4_a2hs_hidden')==='1') return null;
  const ios=isIOSUA();
  const card=el(`<div class="a2hs">

      ${(!ios && deferredInstall) ? '<button class="a2hs-btn" id="a2hs-install">Add to home screen</button>' : ''}

function coordFor(name){ const n=norm(name); if(HOOD_GEO[n]) return HOOD_GEO[n]; for(const k in HOOD_GEO){ if(n.includes(k)) return HOOD_GEO[k]; } return null; }
function milesBetween(a,b){ const p=coordFor(a),q=coordFor(b); if(!p||!q) return null; const dLat=(p[0]-q[0])*69.0, dLng=(p[1]-q[1])*51.3; return Math.sqrt(dLat*dLat+dLng*dLng); }

/* Free-text interests → canonical categories, so we can match hobbies */
const CATS = {
  dining:['splurge','tasting menu','fine dining','dinner out','restaurant','foodie','long dinner','omakase'],
  nightlife:['bar','karaoke','cocktail','night out','speakeasy','dive'],
  outdoors:['hik','trail','cycl','bike','biking','garden','camp','climb','ski','kayak','marathon','606','lakefront','outdoor','boat','sail','lake day'],
  cooking:['cook','grill','bake','bbq','oaxacan','italian food','sunday cook','food'],
  drinks:['wine','ipa','beer','brew','whiskey','half acre','gilt bar','natural wine'],
  games:['board game','trivia','chess','cards','poker','video game','mahjong'],
  music:['live music','concert','vinyl','record','thalia',' band','music'],
  comedy:['comedy','improv','standup','stand-up','second city'],
  arts:['pottery','gallery','museum','ceramic','thrift','vintage','design','painting',' art'],
  sports:['basketball','soccer','pickup','tennis','pickleball','golf'],
  fitness:['gym','movement','workout','fitness','yoga','pilates','run club','running','run ','lift','crossfit','peloton'],
  media:['podcast','true crime','movie','film',' tv','reading','book'],
  community:['church','volunteer','community','faith'],
  hosting:['host','dinner party','entertain'],
  travel:['travel','trip','vacation','weekend away','abroad'],
  gameday:['game day','bears','cubs','white sox',' sox','bulls','blackhawks','sports fan','tailgate'],
  pets:['dog','puppy','rescue pup',' pet'],
};
const CAT_LABEL={dining:'great dinners',nightlife:'a night out',outdoors:'the outdoors',cooking:'cooking & grilling',drinks:'good drinks',games:'games & mahjong',music:'live music',comedy:'comedy',arts:'arts & culture',sports:'sports',fitness:'staying active',media:'shows & movies',community:'community',hosting:'hosting',travel:'travel',gameday:'game day',home:'projects at home',pets:'their dogs'};
function cats(text){ const t=(text||'').toLowerCase(); const out=new Set(); for(const c in CATS){ if(CATS[c].some(k=>t.includes(k))) out.add(c); } return out; }
/* Per-partner interest categories — prefer tapped tags, fall back to free-text (seed data) */
function tagsOf(app,which){ const t=app['partner'+which+'_tags']; return Array.isArray(t)?t:[]; }
function catsOf(app,which){ const t=tagsOf(app,which); if(t.length) return new Set(t.map(tagCat)); return cats(app['partner'+which+'_likes']); }
function hobbyScore(a,b){
  const a1=catsOf(a,1),a2=catsOf(a,2),b1=catsOf(b,1),b2=catsOf(b,2);
  const ap=new Set([...a1,...a2]),bp=new Set([...b1,...b2]);
  const shared=[...ap].filter(x=>bp.has(x));
  let score=Math.min(shared.length,4)*4;
  // exact specific-tag overlap is a stronger signal (two people who BOTH tapped 'golf')
  const at=new Set([...tagsOf(a,1),...tagsOf(a,2)]), bt=new Set([...tagsOf(b,1),...tagsOf(b,2)]);
  const exact=[...at].filter(x=>bt.has(x));
  score+=Math.min(exact.length,3)*4;
  const both = [...a1].some(x=>bp.has(x))&&[...a2].some(x=>bp.has(x))&&[...b1].some(x=>ap.has(x))&&[...b2].some(x=>ap.has(x));
  if(both) score+=6;
  return { score, shared, exact, both };
}
function hardNoFlags(a,b){
  const flags=[]; const barish=(x)=>{const c=cats(x.partner1_likes),d=cats(x.partner2_likes); return c.has('drinks')||d.has('drinks');};
  const kidfree=(x)=>arr(x.kid_ages).includes('No kids');
  const chk=(x,y,xn)=>{ const hn=(x.hard_no||'').toLowerCase();
    if(/bar[-\s]?only|no bar|bar-only/.test(hn) && barish(y) && kidfree(y)) flags.push(`${xn} said no bar-only hangs`);
    if(/kids?-?first|no bar/.test(hn) && barish(y) && kidfree(y) && !kidfree(x)) flags.push(`${xn} is kids-first; ${y.couple_name} is bar-leaning`);
  };
  chk(a,b,a.couple_name); chk(b,a,b.couple_name);
  return [...new Set(flags)];
}

function compat(a,b){
  const reasons=[]; const flags=[]; let score=0;
  // Proximity — heaviest, plus the one hard gate
  const d=milesBetween(a.neighborhood,b.neighborhood);
  let blocked=false, blockReason='';
  if(d!=null){
    if(d>12){ blocked=true; blockReason=`~${Math.round(d)} mi apart, likely too far to keep it up`; }
    // proximity is the #1 driver: reward close, actively penalize far
    let px; if(d<=1.5) px=30; else if(d<=6) px=30*(1-(d-1.5)/4.5); else px=-(d-6)*3;
    score+=px;
    if(px>=8) reasons.push(d<1.3?`Right by each other in ${a.neighborhood}`:`Only ~${d.toFixed(1)} mi apart`);
  } else if(a.neighborhood&&b.neighborhood&&norm(a.neighborhood)===norm(b.neighborhood)){
    score+=30; reasons.push(`Both in ${a.neighborhood}`);
  }
  // Kids & ages — heavy
  const ka=inter(a.kid_ages,b.kid_ages).filter(x=>x!=='No kids'&&x!=='Expecting');
  if(ka.length){ score+=Math.min(ka.length,2)*13; reasons.push(`Kids the same age (${ka.slice(0,2).join(', ')})`); }
  if(arr(a.kid_ages).includes('Expecting')&&arr(b.kid_ages).includes('Expecting')){ score+=14; reasons.push('Both expecting, same season'); }
  if(arr(a.kid_ages).includes('No kids')&&arr(b.kid_ages).includes('No kids')){ score+=12; reasons.push('Both kid-free'); }
  // Hobbies — both spouses; name the specific shared ones when we have them
  const h=hobbyScore(a,b); score+=h.score;
  if(h.exact&&h.exact.length) reasons.push(`Both love ${h.exact.slice(0,3).map(k=>tagLabel(k).toLowerCase()).join(', ')}`);
  else if(h.shared.length) reasons.push(`Share ${h.shared.slice(0,3).map(c=>CAT_LABEL[c]||c).join(', ')}`);
  if(h.both) reasons.push('Both partners find common ground');
  // Life stage
  const ls=inter(a.life_stage,b.life_stage); if(ls.length){ score+=Math.min(ls.length,2)*7; reasons.push(`Both ${ls.slice(0,2).join(' & ').toLowerCase()}`); }
  // Pace & availability
  if(a.hang_appetite&&a.hang_appetite===b.hang_appetite){ score+=7; reasons.push('Same hang pace'); }
  const fs=inter(a.free_slots,b.free_slots); if(fs.length){ score+=Math.min(fs.length,2)*3; reasons.push(`Both free ${fs.slice(0,2).join(' & ').toLowerCase()}`); }
  if(a.bonds_by&&b.bonds_by&&a.bonds_by===b.bonds_by&&a.bonds_by!=='both'){ score+=3; reasons.push(`Both bond by ${a.bonds_by}`); }
  // Energy — minor, lean complementary
  const ea=(num(a.partner1_posture)+num(a.partner2_posture))/2, eb=(num(b.partner1_posture)+num(b.partner2_posture))/2;
  const diff=Math.abs(ea-eb);
  if(ea<40&&eb<40){ score-=4; flags.push('Two reserved couples, the night may need a spark'); }
  else if(diff>=15&&diff<=55){ score+=6; reasons.push('Energies balance nicely'); }
  else if(diff<15){ score+=3; }
  flags.push(...hardNoFlags(a,b));
  score=Math.max(0,Math.min(100,Math.round(score)));
  return { score, reasons, flags:[...new Set(flags)], distance:d, blocked, blockReason, tier:compatTier(score) };
}
function suggestPairs(apps, limit=4){
  const out=[];
  for(let i=0;i<apps.length;i++) for(let j=i+1;j<apps.length;j++){ const c=compat(apps[i],apps[j]); if(!c.blocked&&c.score>0) out.push({a:apps[i],b:apps[j],...c}); }
  return out.sort((x,y)=>y.score-x.score).slice(0,limit);
}
function compatTier(s){ return s>=55?'strong':s>=32?'promising':'worth'; }
function tierLabel(t){ return t==='strong'?'strong match':t==='promising'?'promising':'worth a look'; }

function drawDashboard(){
  const body=$('#console-body'); body.innerHTML='';
  const apps=consoleState.apps, events=consoleState.events, tables=consoleState.tables;
  const newApps=apps.filter(a=>a.status==='new');
  const members=apps.filter(a=>a.status!=='passed');
  const upcoming=events.filter(e=>e.status==='upcoming').sort((a,b)=>(a.scheduled_at||'').localeCompare(b.scheduled_at||''))[0];
  const upSeats=upcoming?arr(upcoming.roster).filter(r=>r.rsvp==='yes').length:0;
  const upCap=upcoming?(upcoming.capacity||12):0;
  const introKeys=new Set(tables.map(t=>[...arr(t.couple_ids)].sort().join('|')));
  const sparkSet=new Set();
  events.filter(e=>e.status==='happened').forEach(ev=>{ const roster=arr(ev.roster);
    for(let i=0;i<roster.length;i++)for(let j=i+1;j<roster.length;j++){ const A=roster[i],B=roster[j];
      if(A.attended&&B.attended&&arr(A.likes).includes(B.couple_id)&&arr(B.likes).includes(A.couple_id)){
        const k=[A.couple_id,B.couple_id].sort().join('|'); if(!introKeys.has(k)) sparkSet.add(k); } } });
  const sparks=sparkSet.size;
  const activeIntros=tables.filter(t=>t.status==='proposed'||t.status==='confirmed').length;
  const paired=apps.filter(a=>a.status==='paired').length;
  const tile=(n,label,sub,tab)=>`<button class="dash-tile" data-goto="${tab}"><div class="dt-n">${n}</div><div class="dt-l">${label}</div>${sub?`<div class="dt-s">${sub}</div>`:''}</button>`;

  if(newApps.length) actions.push({go:'applications', t:`${newApps.length} new application${newApps.length>1?'s':''} to read`, s:'Review them and mark who you love.'});
  if(upcoming) actions.push({go:'events', t:`Next supper: ${esc(upcoming.title)}`, s:`${upcoming.scheduled_at?fmtDay(upcoming.scheduled_at):'set a date'} · ${upSeats}/${upCap} seats reserved. Add couples or plan the night.`});

  if(sparks) actions.push({go:'pairing', t:`${sparks} mutual spark${sparks>1?'s':''} to introduce`, s:'Two couples felt it both ways. Send the intro.'});
  if(activeIntros) actions.push({go:'board', t:`${activeIntros} intro${activeIntros>1?'s':''} in motion`, s:'Check the Board and nudge them along.'});
  body.appendChild(el(`<div>
    <div class="panel-head"><h2>The pulse</h2><div class="count">${esc(fmtDay(new Date().toISOString()))}</div></div>
    <div class="dash-tiles">
      ${tile(newApps.length,'Waiting to review', newApps.length?'new applications':'all caught up','applications')}
      ${tile(members.length,'Couples in the club', paired?paired+' paired so far':null,'applications')}
      ${tile(upcoming?upSeats:'–', upcoming?'Reserved, next supper':'No supper yet', upcoming?'of '+upCap+' seats':'create one','events')}
      ${tile(sparks,'Sparks to introduce', sparks?'mutual matches':'none pending','pairing')}
    </div>
    <div class="sect-title">Needs you</div>
    <div class="dash-actions">${actions.map(a=>`<button class="dash-act" data-goto="${a.go}"><div><div class="da-t">${a.t}</div><div class="da-s">${a.s}</div></div><span class="da-arrow">→</span></button>`).join('')||'<div class="empty"><p>All quiet. Nothing needs you right now.</p></div>'}</div>
  </div>`));
  body.querySelectorAll('[data-goto]').forEach(b=>b.onclick=()=>{ consoleState.tab=b.dataset.goto; renderConsole(); });

/* ---- Matchmaker (ranked suggestions from intakes) ---- */
const mmState = { focus:'all', showFar:false };
function drawMatchmaker(){
  const body=$('#console-body'); body.innerHTML='';
  const pool=consoleState.apps.filter(a=>a.status!=='passed');
  body.appendChild(el(`<div class="panel-head"><h2>Matchmaker</h2><div class="count">Ranked from what couples told you · you decide</div></div>`));
  if(pool.length<2){ body.appendChild(el(`<div class="empty"><h3>Not enough couples yet</h3><p>Once a couple more apply, the best pairings show up here, closest first, weighted by kids and hobbies, with the reasoning.</p></div>`)); return; }

  const ctrl=el(`<div class="mm-controls">
    <label class="mm-focus">Focus <select id="mm_focus">
      <option value="all">the whole pool</option>
      ${pool.map(a=>`<option value="${a.id}" ${mmState.focus===a.id?'selected':''}>${esc(a.couple_name)}</option>`).join('')}
    </select></label>
    <label class="mm-toggle"><input type="checkbox" id="mm_far" ${mmState.showFar?'checked':''}/> show far / gated matches</label>
  </div>`);
  body.appendChild(ctrl);
  ctrl.querySelector('#mm_focus').onchange=(e)=>{ mmState.focus=e.target.value; drawMatchmaker(); };
  ctrl.querySelector('#mm_far').onchange=(e)=>{ mmState.showFar=e.target.checked; drawMatchmaker(); };

  // build ranked pairs
  let pairs=[];
  if(mmState.focus!=='all'){
    const me=pool.find(a=>a.id===mmState.focus);
    pool.forEach(o=>{ if(o.id===me.id) return; const c=compat(me,o); pairs.push({a:me,b:o,...c}); });
  } else {
    for(let i=0;i<pool.length;i++) for(let j=i+1;j<pool.length;j++){ const c=compat(pool[i],pool[j]); pairs.push({a:pool[i],b:pool[j],...c}); }
  }
  const visible=pairs.filter(p=>mmState.showFar||!p.blocked).sort((x,y)=>(x.blocked-y.blocked)||(y.score-x.score));
  const upcoming=consoleState.events.filter(e=>e.status==='upcoming').sort((a,b)=>(a.scheduled_at||'').localeCompare(b.scheduled_at||''))[0];
  const list=el(`<div id="mm-list"></div>`); body.appendChild(list);
  const shown = mmState.focus==='all' ? visible.slice(0,14) : visible;
  if(!shown.length){ list.appendChild(el(`<div class="empty"><p>No matches to show. Try “show far / gated matches.”</p></div>`)); return; }
  shown.forEach(p=>{
    const intro=consoleState.tables.find(t=>arr(t.couple_ids).includes(p.a.id)&&arr(t.couple_ids).includes(p.b.id));
    const distTxt = p.distance!=null?`${p.distance.toFixed(1)} mi apart`:'distance unknown';
    const card=el(`<div class="match-card ${p.blocked?'mm-blocked':''}">
      <div class="mm-top">
        <div class="pairline">${esc(p.a.couple_name)} <span class="vs">·</span> ${esc(p.b.couple_name)}</div>
        <div class="mm-score s-${p.tier}"><b>${p.score}</b><span>${tierLabel(p.tier)}</span></div>
      </div>
      <div class="mm-meta">📍 ${esc(distTxt)} &nbsp;·&nbsp; ${esc(p.a.neighborhood||'–')} ↔ ${esc(p.b.neighborhood||'–')}</div>
      ${p.blocked?`<div class="mm-block">⛔ ${esc(p.blockReason)}</div>`:''}
      <div class="mm-reasons">${p.reasons.slice(0,5).map(r=>`<span class="rchip">${esc(r)}</span>`).join('')||'<span class="sub2">Not much in common on paper</span>'}</div>
      ${p.flags.length?`<div class="mm-flags">${p.flags.map(f=>`<div class="fchip">⚠ ${esc(f)}</div>`).join('')}</div>`:''}
      ${!p.blocked?(()=>{const pl=planSuggestion(p.a,p.b);return `<div class="mm-plan">💡 <b>Set them up with</b> ${esc(pl.activity)}, ${esc(pl.timing)}.</div>`;})():''}
      <div class="mm-act"></div>
    </div>`);
    const act=card.querySelector('.mm-act');
    if(intro){ act.appendChild(el(`<span class="badge b-${esc(intro.status)}">Intro ${esc(intro.status)}</span>`)); }
    else if(!p.blocked){
      const b1=el(`<button class="btn sm">Create intro</button>`); b1.onclick=()=>createIntroDirect(p.a.id,p.b.id); act.appendChild(b1);
      if(upcoming){ const b2=el(`<button class="btn sm ghost">Add both to “${esc(upcoming.title.split('–')[0].trim())}”</button>`); b2.onclick=()=>addBothToMixer(upcoming.id,p.a.id,p.b.id); act.appendChild(b2); }
    }
    list.appendChild(card);
  });
}
/* Auto-compose the best mixer room: geographically coherent (no gated pairs), max chemistry */
function roomAvg(ids){ let s=0,n=0; for(let i=0;i<ids.length;i++)for(let j=i+1;j<ids.length;j++){ s+=compat(appById(ids[i]),appById(ids[j])).score; n++; } return n?s/n:0; }
function composeMixers(pool, K){
  K=Math.min(K,pool.length); const rooms=[]; const seen=new Set(); const seeds=[];
  for(let i=0;i<pool.length;i++)for(let j=i+1;j<pool.length;j++){ const c=compat(pool[i],pool[j]); if(!c.blocked) seeds.push({x:pool[i].id,y:pool[j].id,s:c.score}); }
  seeds.sort((a,b)=>b.s-a.s);
  seeds.slice(0,10).forEach(seed=>{
    const set=[seed.x,seed.y];
    while(set.length<K){
      let best=null,bestScore=-1;
      pool.forEach(c=>{ if(set.includes(c.id))return; if(set.some(id=>compat(appById(id),c).blocked))return;
        const add=set.reduce((sum,id)=>sum+compat(appById(id),c).score,0);
        if(add>bestScore){ bestScore=add; best=c.id; } });
      if(best===null) break; set.push(best);

function pairKey(a,b){ return [a.id,b.id].sort().join('|'); }

  const rem=apps.slice(); const tables=[];

    if(rem.length===1){ const c=rem.shift(); if(tables.length){ let bt=tables[0],bs=-1e9; tables.forEach(t=>{ const s=t.reduce((a,x)=>a+compat(x,c).score-pen(x,c),0); if(s>bs){bs=s;bt=t;} }); bt.push(c); } else { tables.push([c]); } break; }

    const table=[rem[si],rem[sj]]; rem.splice(sj,1); rem.splice(si,1);
    while(table.length<perTable && rem.length>1){ let bi=0,bsc=-1e9; rem.forEach((c,idx)=>{ const s=table.reduce((a,x)=>a+compat(x,c).score-pen(x,c),0); if(s>bsc){bsc=s;bi=idx;} }); table.push(rem[bi]); rem.splice(bi,1); }

      <textarea id="intro_text" style="min-height:220px;line-height:1.55">${esc(text)}</textarea>
      <div class="nav" style="margin-top:14px"><button class="btn ghost" data-cancel>Close</button><button class="btn gold" data-copy>Copy text</button></div>
    </div></div></div>`);
  document.body.appendChild(scrim);
  const close=()=>scrim.remove();
  scrim.querySelector('[data-cancel]').onclick=close; scrim.onclick=(e)=>{ if(e.target===scrim) close(); };
  scrim.querySelector('[data-copy]').onclick=()=>{ const v=$('#intro_text').value; navigator.clipboard?navigator.clipboard.writeText(v).then(()=>toast('Copied. Go send it.'),()=>toast('Select & copy')):toast('Select & copy'); };
}
function inviteMessage(ev, a){
  const link=location.origin+location.pathname+'#/invite/'+ev.id+'/'+((a&&a.token)||a.id);
  const when = ev.scheduled_at ? fmtDate(ev.scheduled_at) : 'a date we\'ll confirm soon';
  const venue = ev.venue||VENUE_NAME;
  return `Hi ${a.partner1_name} and ${a.partner2_name},\n\nWe'd love to have the two of you at ${ev.title}, our next Fourtop supper: ${when} at ${venue}. A handful of vetted couples, a lovely room, and no agenda but good conversation.\n\nReserve your seats here:\n${link}\n\n${PRICE_LABEL}, includes ${PRICE_INCLUDES}. If you feel a spark with a couple, you tell us after and we take it from there.\n\nHope to see you across the table,\nFourtop`;
}
function draftInvite(ev, cid){
  const a=appById(cid); if(!a){ toast('Couple not found'); return; }
  const text=inviteMessage(ev, a);
  const scrim=el(`<div class="modal-scrim"><div class="modal">
    <div class="modal-head"><h2>Invite message</h2><p>A warm note with their reservation link, ready to email or text. Edit anything, then copy.</p></div>
    <div class="modal-body">
      <textarea id="invite_text" style="min-height:250px;line-height:1.55">${esc(text)}</textarea>
      <div class="nav" style="margin-top:14px"><button class="btn ghost" data-cancel>Close</button><button class="btn gold" data-copy>Copy message</button></div>
    </div></div></div>`);
  document.body.appendChild(scrim);
  const close=()=>scrim.remove();
  scrim.querySelector('[data-cancel]').onclick=close; scrim.onclick=(e)=>{ if(e.target===scrim) close(); };
  scrim.querySelector('[data-copy]').onclick=()=>{ const v=$('#invite_text').value; navigator.clipboard?navigator.clipboard.writeText(v).then(()=>toast('Copied. Go send it.'),()=>toast('Select & copy')):toast('Select & copy'); };
}
async function advanceTable(id,status){
  const t=consoleState.tables.find(x=>x.id===id);
  await DB.updateTable(id,{status});
  if(t){ if(status==='matched'){ for(const cid of arr(t.couple_ids)) await DB.updateApplication(cid,{status:'paired'}); }
    if(status==='fizzled'){ for(const cid of arr(t.couple_ids)){ const a=appById(cid); if(a&&a.status==='paired') await DB.updateApplication(cid,{status:'attended'}); } } }
  toast('Moved to '+status); await loadConsoleData();
}
function planTable(t){
  const scrim=el(`<div class="modal-scrim"><div class="modal">
    <div class="modal-head"><h2>Set the plan</h2><p>${esc(arr(t.couple_ids).map(nameFor).join('  +  '))}</p></div>
    <div class="modal-body">
      <div class="field"><label>Where</label><input type="text" id="p_place" value="${esc(t.place||'')}" placeholder="e.g. Lula Cafe, Logan Square" /></div>
      <div class="two"><div class="field"><label>When</label><input type="datetime-local" id="p_when" value="${t.scheduled_at?new Date(t.scheduled_at).toISOString().slice(0,16):''}" /></div>
        <div class="field"><label>Format</label><div class="chips" id="p_fmt" style="margin-top:2px"><div class="chip ${t.format!=='outing'?'on':''}" data-fmt="dinner">Dinner</div><div class="chip ${t.format==='outing'?'on':''}" data-fmt="outing">Outing</div></div></div></div>
      <div class="nav"><button class="btn ghost" data-cancel>Cancel</button><button class="btn" data-save>Save plan</button></div>
    </div></div></div>`);
  document.body.appendChild(scrim);
  let fmt=t.format||'dinner';
  scrim.querySelectorAll('#p_fmt .chip').forEach(c=>c.onclick=()=>{ scrim.querySelectorAll('#p_fmt .chip').forEach(x=>x.classList.remove('on')); c.classList.add('on'); fmt=c.dataset.fmt; });
  const close=()=>scrim.remove(); scrim.querySelector('[data-cancel]').onclick=close; scrim.onclick=(e)=>{ if(e.target===scrim) close(); };
  scrim.querySelector('[data-save]').onclick=async()=>{ const when=$('#p_when').value;
    await DB.updateTable(t.id,{place:$('#p_place').value.trim(), scheduled_at:when?new Date(when).toISOString():null, format:fmt});
    close(); toast('Plan saved'); await loadConsoleData(); };
}
function addTableNote(t){
  const scrim=el(`<div class="modal-scrim"><div class="modal">
    <div class="modal-head"><h2>Add a note</h2><p>${esc(arr(t.couple_ids).map(nameFor).join('  +  '))}</p></div>
    <div class="modal-body"><div class="field"><textarea id="m_note" placeholder="What happened, next step, how it felt…">${esc(t.notes||'')}</textarea></div>
      <div class="nav"><button class="btn ghost" data-cancel>Cancel</button><button class="btn" data-save>Save note</button></div></div></div></div>`);
  document.body.appendChild(scrim);
  const close=()=>scrim.remove(); scrim.querySelector('[data-cancel]').onclick=close; scrim.onclick=(e)=>{ if(e.target===scrim) close(); };
  scrim.querySelector('[data-save]').onclick=async()=>{ await DB.updateTable(t.id,{notes:$('#m_note').value}); close(); toast('Note saved'); await loadConsoleData(); };
}

/* ============================================================ */
function isAuthReturn(){ return /access_token=|refresh_token=|type=magiclink|type=recovery|[?&]code=/.test((location.hash||'')+(location.search||'')); }
async function boot(){
  setFavicon();
  if(!USE_SUPABASE && DB.seedIfEmpty) DB.seedIfEmpty();
  if(USE_SUPABASE && isAuthReturn()){
    // returning from the magic link: let supabase read the token, clean the URL, then open the console
    await refreshSbSession();
    try{ history.replaceState(null,'', location.pathname); }catch(e){}
    consoleState.tab='applications';
    renderConsole();
    return;
  }
  route();
}
boot();
</script>
