<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#26201a" />
<title>Kith Club · Chicago</title>
<style>
  :root{
    --bg:#f4ede1;
    --bg2:#ece2d1;
    --paper:#fffdf8;
    --ink:#241f19;
    --ink2:#3b342b;
    --muted:#8c7f6c;
    --line:#e5dac6;
    --line2:#d7c8ad;
    --rust:#b3543a;
    --rust-d:#8c3f28;
    --forest:#33402f;
    --forest-d:#26301f;
    --gold:#c39a4e;
    --gold-l:#e6c987;
    --good:#4a7a4f;
    --shadow:0 18px 46px rgba(48,38,24,.15);
    --shadow-sm:0 6px 20px rgba(48,38,24,.10);
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--sans);color:var(--ink);background:var(--bg);
    background-image:radial-gradient(1200px 640px at 50% -10%,#faf4ea 0%,var(--bg) 58%);
    min-height:100vh;-webkit-font-smoothing:antialiased;
  }
  a{color:var(--rust-d)}
  button{font-family:inherit;cursor:pointer}
  .hidden{display:none !important}
  h1,h2,h3{font-family:var(--serif);font-weight:600;letter-spacing:.2px}
  .wrap{max-width:660px;margin:0 auto;padding:0 20px}
  .console-wrap{max-width:1060px;margin:0 auto;padding:0 20px}

  /* mark (four-top monoline) */
  .mono{width:46px;height:46px;border-radius:13px;flex:none;position:relative;display:grid;place-items:center;
    background:linear-gradient(155deg,var(--rust),var(--rust-d));box-shadow:var(--shadow-sm)}
  .mono::after{content:"";position:absolute;inset:5px;border:1px solid rgba(255,244,228,.32);border-radius:9px}
  .mono svg{width:62%;height:62%;position:relative;z-index:1}
  .monoc svg{width:66%;height:66%}
  .seal svg{width:50%;height:50%}

  /* buttons */
  .btn{border:none;border-radius:12px;font-size:16px;font-weight:600;padding:15px 24px;letter-spacing:.2px;
    transition:transform .06s ease,filter .15s ease;background:var(--rust);color:#fff;box-shadow:var(--shadow-sm)}
  .btn:hover{filter:brightness(1.05)}
  .btn:active{transform:translateY(1px)}
  .btn[disabled]{opacity:.4;cursor:not-allowed;filter:none}
  .btn.ghost{background:transparent;color:var(--ink);box-shadow:none;border:1.5px solid var(--line2)}
  .btn.ghost:hover{background:#fbf5ea}
  .btn.forest{background:var(--forest)}
  .btn.gold{background:linear-gradient(155deg,var(--gold),#a8823c);color:#2a2113}
  .btn.sm{padding:9px 15px;font-size:14px;border-radius:10px}
  .btn.block{display:block;width:100%}

  /* front door */
  .door{padding:20px 0 64px}
  .door-top{display:flex;align-items:center;justify-content:space-between;padding:22px 0 6px}
  .brand{display:flex;align-items:center;gap:13px}
  .wordmark{font-family:var(--serif);font-size:20px;font-weight:600;line-height:1}
  .wordmark small{display:block;font-family:var(--sans);font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-top:4px}
  .door-top .city{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:700}

  .card{background:var(--paper);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:34px 30px;margin-top:20px}
  .rule{height:1px;background:linear-gradient(90deg,transparent,var(--line2),transparent);margin:22px 0}
  .kicker{font-size:11.5px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);}
  .kicker.rustk{color:var(--rust-d)}

  .hero h1{font-size:37px;line-height:1.1;margin:14px 0 0;letter-spacing:.1px}
  .hero .lede{color:var(--ink2);font-size:16.5px;line-height:1.6;margin:18px 0 0}
  .hero .lede em{color:var(--rust-d);font-style:italic}
  .steps3{margin:26px 0 0;counter-reset:s}
  .steps3 .s{display:flex;gap:15px;align-items:flex-start;padding:14px 0;border-top:1px solid var(--line)}
  .steps3 .s:first-child{border-top:none}
  .steps3 .n{flex:none;width:30px;height:30px;border-radius:50%;border:1.5px solid var(--gold);color:var(--rust-d);display:grid;place-items:center;font-family:var(--serif);font-size:15px;font-weight:600;margin-top:1px}
  .steps3 .t{font-size:15.5px;line-height:1.5;color:var(--ink2)}
  .steps3 .t b{color:var(--ink);font-weight:650}

  /* form */
  .progress{display:flex;gap:6px;margin:0 0 22px}
  .progress i{flex:1;height:5px;border-radius:99px;background:var(--line2);transition:background .2s}
  .progress i.on{background:var(--rust)}
  .step h2{font-size:26px;margin:8px 0 4px}
  .step .sub{color:var(--muted);font-size:14.5px;line-height:1.55;margin:0 0 22px}
  .field{margin:0 0 19px}
  .field > label{display:block;font-weight:650;font-size:14.5px;margin:0 0 8px}
  .field .hint{color:var(--muted);font-weight:400;font-size:13px;margin-left:2px}
  input[type=text],input[type=email],input[type=datetime-local],input[type=number],textarea,select{
    width:100%;border:1.5px solid var(--line2);background:#fffefb;border-radius:11px;padding:13px 14px;font-size:16px;font-family:inherit;color:var(--ink);transition:border-color .15s,box-shadow .15s}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--rust);box-shadow:0 0 0 3px rgba(179,84,58,.14)}
  textarea{min-height:106px;resize:vertical;line-height:1.55}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  @media(max-width:470px){.two{grid-template-columns:1fr}}
  .chips{display:flex;flex-wrap:wrap;gap:9px}
  .chip{border:1.5px solid var(--line2);background:#fffefb;border-radius:999px;padding:10px 16px;font-size:14.5px;font-weight:600;color:var(--ink);transition:all .12s;user-select:none}
  .chip:hover{border-color:var(--rust)}
  .chip.on{background:var(--rust);border-color:var(--rust);color:#fff}
  .chip.forest.on{background:var(--forest);border-color:var(--forest)}
  .slider-row{display:flex;align-items:center;gap:14px;margin-top:4px}
  .slider-row output{font-weight:700;color:var(--rust-d);min-width:34px;text-align:right;font-variant-numeric:tabular-nums}
  input[type=range]{-webkit-appearance:none;appearance:none;height:7px;border-radius:99px;flex:1;background:linear-gradient(90deg,var(--forest),var(--gold),var(--rust));cursor:pointer}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:25px;height:25px;border-radius:50%;background:#fff;border:3px solid var(--rust);box-shadow:var(--shadow-sm)}
  input[type=range]::-moz-range-thumb{width:21px;height:21px;border-radius:50%;background:#fff;border:3px solid var(--rust)}
  .scale-ends{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:6px}
  .nav{display:flex;gap:12px;margin-top:6px}
  .nav .btn{flex:1}
  .nav .btn.ghost{flex:0 0 auto;min-width:92px}

  .review dl{margin:0}
  .review .rrow{padding:13px 0;border-bottom:1px solid var(--line)}
  .review .rrow:last-child{border-bottom:none}
  .review dt{font-size:11.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .review dd{margin:6px 0 0;font-size:15.5px;line-height:1.55;white-space:pre-wrap}

  .done{text-align:center;padding:46px 28px}
  .done .seal{width:78px;height:78px;border-radius:50%;border:1.5px solid var(--gold);color:var(--rust-d);display:grid;place-items:center;margin:0 auto 20px;font-size:34px;font-family:var(--serif)}
  .done h2{font-size:28px;margin:0 0 10px}
  .done p{color:var(--ink2);font-size:16px;line-height:1.6;margin:0 auto;max-width:440px}
  .foot{text-align:center;color:var(--muted);font-size:12.5px;padding:30px 0 26px;line-height:1.7}
  .foot a{color:var(--muted);text-decoration:underline}

  /* splash */
  .splash{position:fixed;inset:0;z-index:100;display:grid;place-items:center;padding:24px;background:radial-gradient(900px 560px at 50% 8%,#3c4a35 0%,#2a3323 55%,#20281b 100%);animation:sfade .35s ease}
  @keyframes sfade{from{opacity:0}to{opacity:1}}
  .splash-card{max-width:500px;width:100%;text-align:center;color:#f2eadc}
  .splash .mono{margin:0 auto 24px;width:54px;height:54px}
  .splash .kicker{color:var(--gold-l)}
  .splash h1{font-family:var(--serif);font-size:40px;line-height:1.08;margin:16px 0 0;color:#fffdf8;font-weight:600}
  .splash .defline{font-family:var(--serif);font-size:15px;color:var(--gold-l);margin:16px auto 0;letter-spacing:.02em}
  .splash .defline i{font-style:italic;opacity:.85}
  .splash .thin{width:52px;height:1px;background:var(--gold);margin:22px auto 0;opacity:.7}
  .splash .sub{color:#cdd2c1;font-size:16px;line-height:1.62;margin:22px auto 0;max-width:430px}
  .splash .sub b{color:#f0e7d3;font-weight:600}
  .splash .btn{margin-top:30px;padding:15px 40px}
  .splash .fine{color:#939c86;font-size:12px;margin-top:18px;letter-spacing:.02em}
  @media(max-width:470px){.splash h1{font-size:31px}}

  /* console */
  .cbar{background:var(--forest);color:#f2eadc;border-bottom:2px solid var(--gold)}
  .cbar-in{max-width:1060px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:16px;justify-content:space-between;flex-wrap:wrap}
  .cbar .brandc{display:flex;align-items:center;gap:12px;font-family:var(--serif);font-size:17px}
  .cbar .monoc{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.12);display:grid;place-items:center;font-family:var(--serif);font-size:14px;color:#fdf3e6;letter-spacing:1px}
  .tabs{display:flex;gap:3px;background:rgba(0,0,0,.16);border-radius:12px;padding:4px}
  .tabs button{background:transparent;border:none;color:#dfe6d5;font-weight:650;font-size:13.5px;padding:8px 15px;border-radius:9px}
  .tabs button.on{background:#fffdf8;color:var(--forest-d)}
  .cbar .who{font-size:12px;opacity:.85;display:flex;align-items:center;gap:10px}
  .cbar .who a{color:#fff}

  .panel{margin-top:24px;padding-bottom:60px}
  .panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .panel-head h2{font-size:23px;margin:0}
  .panel-head .count{color:var(--muted);font-size:13px}

  table.list{width:100%;border-collapse:collapse;background:var(--paper);border-radius:15px;overflow:hidden;box-shadow:var(--shadow-sm);border:1px solid var(--line)}
  table.list th{text-align:left;font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);font-weight:700;padding:13px 16px;border-bottom:1px solid var(--line);background:#faf3e6}
  table.list td{padding:14px 16px;border-bottom:1px solid var(--line);font-size:15px;vertical-align:middle}
  table.list tr:last-child td{border-bottom:none}
  table.list tbody tr{cursor:pointer;transition:background .1s}
  table.list tbody tr:hover{background:#faf3e6}
  .cn{font-weight:650}
  .sub2{color:var(--muted);font-size:12.5px}

  .badge{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.04em;padding:4px 11px;border-radius:999px;text-transform:capitalize}
  .b-new{background:#e7efdf;color:var(--forest-d)}
  .b-invited{background:#e0ecf3;color:#2f6a8a}
  .b-attended{background:#f3e9d0;color:#8a6a24}
  .b-paired{background:#e6ddef;color:#6b4a8a}
  .b-passed{background:#eee3df;color:#8a5a4a}
  .b-proposed{background:#eef1e9;color:var(--forest-d)}
  .b-confirmed{background:#e0ecf3;color:#2f6a8a}
  .b-happened{background:#f3e9d0;color:#8a6a24}
  .b-fizzled{background:#eee1de;color:#9a5040}
  .b-upcoming{background:#e0ecf3;color:#2f6a8a}

  .empty{background:var(--paper);border:1px dashed var(--line2);border-radius:18px;padding:46px 26px;text-align:center;color:var(--muted)}
  .empty h3{color:var(--ink);margin:0 0 6px;font-size:19px}

  .grid-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:680px){.grid-cards{grid-template-columns:1fr}}
  .ecard{background:var(--paper);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow-sm);padding:18px 20px;cursor:pointer;transition:transform .07s,box-shadow .15s}
  .ecard:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
  .ecard h3{margin:0;font-size:19px}
  .ecard .meta{color:var(--muted);font-size:13.5px;margin:8px 0 0;line-height:1.5}
  .ecard .rosterline{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:13px;border-top:1px solid var(--line)}
  .ecard .avstack{display:flex}
  .ecard .av{width:26px;height:26px;border-radius:50%;background:var(--bg2);border:2px solid var(--paper);margin-left:-7px;display:grid;place-items:center;font-size:11px;font-weight:700;color:var(--rust-d)}
  .ecard .av:first-child{margin-left:0}

  /* drawer */
  .scrim{position:fixed;inset:0;background:rgba(36,31,25,.44);backdrop-filter:blur(2px);z-index:40;display:flex;justify-content:flex-end}
  .drawer{width:min(580px,100%);background:var(--bg);height:100%;overflow-y:auto;box-shadow:-14px 0 40px rgba(0,0,0,.22);animation:slidein .22s ease}
  @keyframes slidein{from{transform:translateX(30px);opacity:.4}to{transform:none;opacity:1}}
  .drawer-head{position:sticky;top:0;background:var(--paper);border-bottom:1px solid var(--line);padding:18px 22px;display:flex;align-items:center;justify-content:space-between;z-index:2}
  .drawer-head h2{margin:0;font-size:21px}
  .x{border:none;background:#f0e6d5;width:36px;height:36px;border-radius:10px;font-size:18px;color:var(--ink)}
  .drawer-body{padding:22px}
  .kv{margin:0 0 17px}
  .kv .k{font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted)}
  .kv .v{margin-top:4px;font-size:15.5px;line-height:1.55;white-space:pre-wrap}
  .open-answer{background:#faf3e6;border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:12px;padding:15px 16px;margin:0 0 14px}
  .open-answer .k{color:var(--rust-d)}
  .posture{display:flex;align-items:center;gap:10px;margin-top:6px}
  .posture .bar{flex:1;height:8px;border-radius:99px;background:var(--line2);position:relative;overflow:hidden}
  .posture .bar span{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--forest),var(--rust));border-radius:99px}
  .posture .num{font-variant-numeric:tabular-nums;font-weight:700;color:var(--rust-d);min-width:30px;text-align:right}
  .sect-title{font-family:var(--serif);font-size:13px;color:var(--muted);margin:26px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--line);text-transform:uppercase;letter-spacing:.09em;font-weight:700}
  .savebar{position:sticky;bottom:0;background:var(--paper);border-top:1px solid var(--line);padding:14px 22px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .savebar select{max-width:170px}
  .saved-note{color:var(--good);font-size:13px;font-weight:600;opacity:0;transition:opacity .2s}
  .saved-note.show{opacity:1}

  /* roster rows */
  .roster-row{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin:0 0 10px}
  .roster-row .top{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .roster-row .pn{font-weight:650;font-size:15px}
  .toggle{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;user-select:none}
  .toggle .sw{width:40px;height:23px;border-radius:99px;background:var(--line2);position:relative;transition:background .15s}
  .toggle .sw::after{content:"";position:absolute;width:19px;height:19px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left .15s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .toggle.on .sw{background:var(--good)}
  .toggle.on .sw::after{left:19px}
  .toggle.on{color:var(--good)}
  .likes-wrap{margin-top:12px;padding-top:12px;border-top:1px dashed var(--line2)}
  .likes-wrap .lbl{font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  .minichip{border:1.5px solid var(--line2);background:#fffefb;border-radius:999px;padding:6px 12px;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;transition:all .12s}
  .minichip:hover{border-color:var(--rust)}
  .minichip.on{background:var(--rust);border-color:var(--rust);color:#fff}
  .minichip.mutual{background:var(--forest);border-color:var(--forest);color:#fff}
  .rlinks{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:11px}
  .rsvp{font-size:10.5px;font-weight:700;letter-spacing:.03em;padding:3px 9px;border-radius:999px}
  .rsvp.yes{background:#e7efdf;color:var(--good)}
  .rsvp.no{background:#eee1de;color:#9a5040}
  .rsvp.none{background:#efe7d6;color:var(--muted)}
  .linkbtn{border:1px solid var(--line2);background:#fffefb;border-radius:8px;font-size:12px;font-weight:600;color:var(--ink2);padding:5px 10px;cursor:pointer}
  .linkbtn:hover{border-color:var(--rust);color:var(--rust-d)}
  .suggest-row{background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin:0 0 8px}
  .suggest-row .srtop{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .suggest-row .pn{font-weight:600;font-size:14.5px}
  .suggest-row .vs{color:var(--gold)}
  .score{font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 9px;border-radius:999px;white-space:nowrap}
  .s-strong{background:#e7efdf;color:var(--forest-d)}
  .s-promising{background:#f3e9d0;color:#8a6a24}
  .s-worth{background:#efe7d6;color:var(--muted)}

  /* pairing */
  .match-card{background:var(--paper);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow-sm);padding:18px 20px;margin:0 0 13px}
  .match-card .pairline{display:flex;align-items:center;gap:12px;font-family:var(--serif);font-size:18px;font-weight:600;flex-wrap:wrap}
  .match-card .vs{color:var(--gold);font-size:20px}
  .match-card .mutual-tag{display:inline-block;background:#e7efdf;color:var(--forest-d);font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:4px 10px;border-radius:999px;margin-left:auto}
  .match-card .why{color:var(--muted);font-size:13.5px;margin:10px 0 0;line-height:1.5}
  .match-card .act{margin-top:14px}

  /* board */
  .board{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:start}
  @media(max-width:940px){.board{grid-template-columns:1fr 1fr}}
  @media(max-width:580px){.board{grid-template-columns:1fr}}
  .col{background:var(--bg2);border-radius:15px;padding:6px}
  .col > h3{font-size:12px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin:11px 12px;display:flex;justify-content:space-between}
  .tcard{background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:14px;margin:8px 4px;box-shadow:var(--shadow-sm)}
  .tcard .couples{font-weight:650;font-size:15px;line-height:1.4}
  .tcard .plan{color:var(--muted);font-size:13px;margin:7px 0 0;line-height:1.5}
  .tcard .plan b{color:var(--ink);font-weight:600}
  .tcard .from{font-size:11.5px;color:var(--gold);font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-top:8px}
  .tcard .tnote{background:#faf3e6;border-radius:9px;padding:9px 11px;font-size:13px;margin:10px 0 0;line-height:1.5;white-space:pre-wrap}
  .tcard .actions{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap}
  .tcard .actions button{font-size:12.5px;padding:7px 11px;border-radius:9px}

  .modal-scrim{position:fixed;inset:0;background:rgba(36,31,25,.44);z-index:50;display:grid;place-items:center;padding:18px}
  .modal{background:var(--bg);border-radius:20px;max-width:540px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow)}
  .modal-head{padding:22px 24px 0}
  .modal-head h2{margin:0;font-size:22px}
  .modal-head p{color:var(--muted);font-size:14px;margin:6px 0 0;line-height:1.5}
  .modal-body{padding:18px 24px 24px}

<body>
  <div id="app"></div>

<script>
/* ============================================================
   Kith Club — Chicago  ·  curated club for couple friends
   Model: apply → curated mixer → flag who you clicked with →
          concierge pairs the mutual sparks into a 1:1 hang.
   Self-contained, no build step, runs on static hosting.

   DATA LAYER — localStorage by default (seeds sample data so the
   console is alive immediately). To use the real backend, paste a
   Supabase URL + anon key below and every read/write goes there.
   ============================================================ */
const SUPABASE_URL = "";
const SUPABASE_ANON_KEY = "";
const ADMIN_EMAIL = "draymond@threecitiessocial.com";
const USE_SUPABASE = !!(SUPABASE_URL && SUPABASE_ANON_KEY);

/* helpers */
const $ = (sel, root=document) => root.querySelector(sel);
const el = (html) => { const t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstChild; };
const esc = (s) => (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid = () => 'a'+Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4);
const nowISO = () => new Date().toISOString();
const initials = (name) => (name||'?').split(/[\s&]+/).filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove('show'),2200); }

/* Kith mark — a refined serif K monogram */
function markSVG(color){ return `<svg viewBox="0 0 100 100"><text x="50" y="76" text-anchor="middle" font-family="'Iowan Old Style','Palatino Linotype',Palatino,'Book Antiqua',Georgia,serif" font-size="80" font-weight="600" fill="${color}">K</text></svg>`; }
const MARK_CREAM = markSVG('#fff6ea');
const MARK_RUST  = markSVG('#b3543a');
function setFavicon(){
  const svg = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%2333402f'/>`
    + `<text x='50' y='74' text-anchor='middle' font-family='Georgia,serif' font-size='68' font-weight='600' fill='%23e6c987'>K</text></svg>`;
  let link=document.querySelector("link[rel='icon']"); if(!link){ link=document.createElement('link'); link.rel='icon'; document.head.appendChild(link); }
  link.type='image/svg+xml'; link.href="data:image/svg+xml,"+svg.replace(/</g,'%3C').replace(/>/g,'%3E').replace(/#/g,'%23').replace(/ /g,'%20');
}
function fmtDate(iso){ if(!iso) return '—'; const d=new Date(iso); return d.toLocaleString(undefined,{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}); }
function fmtDay(iso){ if(!iso) return 'no date set'; const d=new Date(iso); return d.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'}); }
function timeAgo(iso){ const s=(Date.now()-new Date(iso).getTime())/1000; if(s<60)return'just now'; if(s<3600)return Math.floor(s/60)+'m ago'; if(s<86400)return Math.floor(s/3600)+'h ago'; return Math.floor(s/86400)+'d ago'; }

/* ============================================================ DB ============================================================ */
const DB = (() => {
  const AKEY='t4_applications', TKEY='t4_tables', EKEY='t4_events', SEEDED='t4_seeded_chi_v1';
  const ls = {
    _read(k){ try{ return JSON.parse(localStorage.getItem(k)||'[]'); }catch(e){ return []; } },
    _write(k,v){ localStorage.setItem(k, JSON.stringify(v)); },
    async listApplications(){ return this._read(AKEY).sort((a,b)=> b.created_at.localeCompare(a.created_at)); },
    async insertApplication(row){ const r={...row,id:uid(),created_at:nowISO(),status:row.status||'new'}; const all=this._read(AKEY); all.push(r); this._write(AKEY,all); return r; },
    async updateApplication(id,patch){ const all=this._read(AKEY); const i=all.findIndex(x=>x.id===id); if(i>=0){ all[i]={...all[i],...patch}; this._write(AKEY,all); return all[i]; } },
    async listTables(){ return this._read(TKEY).sort((a,b)=> b.created_at.localeCompare(a.created_at)); },
    async insertTable(row){ const r={...row,id:uid(),created_at:nowISO()}; const all=this._read(TKEY); all.push(r); this._write(TKEY,all); return r; },
    async updateTable(id,patch){ const all=this._read(TKEY); const i=all.findIndex(x=>x.id===id); if(i>=0){ all[i]={...all[i],...patch}; this._write(TKEY,all); return all[i]; } },
    async listEvents(){ return this._read(EKEY).sort((a,b)=> (b.scheduled_at||'').localeCompare(a.scheduled_at||'')); },
    async insertEvent(row){ const r={...row,id:uid(),created_at:nowISO(),roster:row.roster||[]}; const all=this._read(EKEY); all.push(r); this._write(EKEY,all); return r; },
    async updateEvent(id,patch){ const all=this._read(EKEY); const i=all.findIndex(x=>x.id===id); if(i>=0){ all[i]={...all[i],...patch}; this._write(EKEY,all); return all[i]; } },
    seedIfEmpty(){
      if(localStorage.getItem(SEEDED)) return;
      const apps=[];
      SEED.forEach((s,i)=>{ apps.push({...s,id:uid(),created_at:new Date(Date.now()-(SEED.length-i)*3600e3*11).toISOString()}); });
      this._write(AKEY,apps);
      // one past mixer with recorded attendance + likes (a mutual pair to demo Pairing)
      const [a0,a1,a2,a3]=apps; // Alvarez-Kims, Jordan&Priya, Osei, Sam&Theo
      const past={ id:uid(), created_at:nowISO(), title:'The Winter Table — a curated mixer',
        venue:'The Hideout, West Town', scheduled_at:new Date(Date.now()-6*86400e3).toISOString(),
        capacity:12, status:'happened', notes:'First Chicago cohort. Great energy, two clear sparks.',
        roster:[
          {couple_id:a0.id, attended:true, rsvp:'yes', likes:[a1.id]},
          {couple_id:a1.id, attended:true, rsvp:'yes', likes:[a0.id, a2.id]}, // a0<->a1 mutual
          {couple_id:a2.id, attended:true, rsvp:'yes', likes:[]},
          {couple_id:a3.id, attended:true, rsvp:'yes', likes:[]},
        ]};
      const upcoming={ id:uid(), created_at:nowISO(), title:'Spring Supper Club — mixer no. 2',
        venue:'Kumiko, West Loop', scheduled_at:new Date(Date.now()+12*86400e3).toISOString(),
        capacity:12, status:'upcoming', notes:'', roster:[] };
      this._write(EKEY,[past,upcoming]);
      // reflect statuses: attendees -> attended
      apps.forEach(a=>{ if([a0.id,a1.id,a2.id,a3.id].includes(a.id)) a.status='attended'; });
      this._write(AKEY,apps);
      localStorage.setItem(SEEDED,'1');
    }
  };
  let sb=null;
  const remote = {
    async _client(){ if(sb) return sb; await loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js'); sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY); return sb; },
    async _q(fn){ const c=await this._client(); const {data,error}=await fn(c); if(error)throw error; return data; },
    async listApplications(){ return this._q(c=>c.from('applications').select('*').order('created_at',{ascending:false})); },
    async insertApplication(row){ return this._q(c=>c.from('applications').insert([row]).select().single()); },
    async updateApplication(id,patch){ return this._q(c=>c.from('applications').update(patch).eq('id',id).select().single()); },
    async listTables(){ return this._q(c=>c.from('tables').select('*').order('created_at',{ascending:false})); },
    async insertTable(row){ return this._q(c=>c.from('tables').insert([row]).select().single()); },
    async updateTable(id,patch){ return this._q(c=>c.from('tables').update(patch).eq('id',id).select().single()); },
    async listEvents(){ return this._q(c=>c.from('events').select('*').order('scheduled_at',{ascending:false})); },
    async insertEvent(row){ return this._q(c=>c.from('events').insert([row]).select().single()); },
    async updateEvent(id,patch){ return this._q(c=>c.from('events').update(patch).eq('id',id).select().single()); },
    seedIfEmpty(){},
    async magicLink(email){ const c=await this._client(); return c.auth.signInWithOtp({email}); },
  };
  return USE_SUPABASE ? remote : ls;
})();
function loadScript(src){ return new Promise((res,rej)=>{ const s=document.createElement('script'); s.src=src; s.onload=res; s.onerror=rej; document.head.appendChild(s); }); }

function drawStep(){ const b=$('#door-body'); b.innerHTML=''; STEPS[intake.step](); window.scrollTo({top:0,behavior:'smooth'}); }
function goNext(){ if(intake.step<STEPS.length-1){ intake.step++; drawStep(); } }
function goBack(){ if(intake.step>0){ intake.step--; drawStep(); } }
function progressBar(){ let s=''; for(let i=1;i<=FORM_STEPS;i++) s+=`<i class="${i<=intake.step?'on':''}"></i>`; return `<div class="progress">${s}</div>`; }

/* ============================================================ Compatibility engine (decision support, not auto-matching) ============================================================ */
function inter(a,b){ const s=new Set(arr(b)); return arr(a).filter(x=>s.has(x)); }
function compat(a,b){
  let score=0; const reasons=[];
  const ls=inter(a.life_stage,b.life_stage); if(ls.length){ score+=Math.min(ls.length,2)*17; reasons.push(`Both ${ls.slice(0,2).join(' & ').toLowerCase()}`); }
  const ka=inter(a.kid_ages,b.kid_ages).filter(x=>x!=='No kids'&&x!=='Expecting'); if(ka.length){ score+=Math.min(ka.length,2)*14; reasons.push(`Kids around the same age (${ka.slice(0,2).join(', ')})`); }
  if(a.neighborhood&&b.neighborhood&&a.neighborhood.trim().toLowerCase()===b.neighborhood.trim().toLowerCase()){ score+=16; reasons.push(`Both in ${a.neighborhood}`); }
  const fs=inter(a.free_slots,b.free_slots); if(fs.length){ score+=Math.min(fs.length,3)*7; reasons.push(`Free ${fs.slice(0,2).join(' & ').toLowerCase()}`); }
  if(a.hang_appetite&&a.hang_appetite===b.hang_appetite){ score+=12; reasons.push('Same pace'); }
  if(a.bonds_by&&b.bonds_by&&(a.bonds_by===b.bonds_by||a.bonds_by==='both'||b.bonds_by==='both')){ score+=10; reasons.push(a.bonds_by===b.bonds_by?`Both bond by ${a.bonds_by}`:'Bond compatibly'); }
  return { score:Math.min(100,Math.round(score)), reasons };
}
function suggestPairs(apps, limit=4){
  const out=[];
  for(let i=0;i<apps.length;i++) for(let j=i+1;j<apps.length;j++){ const c=compat(apps[i],apps[j]); if(c.score>0) out.push({a:apps[i],b:apps[j],...c}); }
  return out.sort((x,y)=>y.score-x.score).slice(0,limit);
}
function compatTier(s){ return s>=55?'strong':s>=32?'promising':'worth'; }
function tierLabel(t){ return t==='strong'?'strong match':t==='promising'?'promising':'worth a look'; }

async function renderInvite([eventId, coupleId]){

    <div id="rsvp-area" style="margin-top:22px"></div>
  </div>`);
  const area = body.querySelector('#rsvp-area');
  if(past){ area.appendChild(el(`<div class="note" style="font-size:14px">This mixer has already happened. If you were there, you can <a href="#/picks/${eventId}/${coupleId}">tell us who you clicked with →</a></div>`)); }

  publicShell(body);
  window.scrollTo({top:0,behavior:'smooth'});
}
async function renderPicks([eventId, coupleId]){
  const {ev, apps} = await loadPublic(eventId);
  const me=apps.find(a=>a.id===coupleId);
  if(!ev||!me){ return publicError("We couldn't find that link. It may have expired."); }
  const roster=arr(ev.roster); let r=roster.find(x=>x.couple_id===coupleId);
  const others=roster.filter(x=>x.couple_id!==coupleId);
  const picked=new Set(r?arr(r.likes):[]);
  const body=el(`<div class="card">
    <span class="kicker">${esc(ev.title)}</span>
    <h1 style="font-size:29px;line-height:1.15;margin:12px 0 0">So — who did you two click with?</h1>
    <p class="lede" style="font-size:15px;margin-top:14px">Tap any couple you'd genuinely want to see again. It's private — they only hear about it if the feeling's mutual. No pressure to pick anyone.</p>
    <div class="rule"></div>
    <div id="pick-list"></div>
    <button class="btn block" id="submit-picks" style="margin-top:18px">Send our picks</button>
    <div class="note" style="text-align:center">Only mutual matches ever get introduced.</div>
  </div>`);
  const list=body.querySelector('#pick-list');
  if(!others.length){ list.appendChild(el(`<div class="note">You were the only couple on this roster. Nothing to pick yet.</div>`)); }
  others.forEach(o=>{ const a=apps.find(x=>x.id===o.couple_id); if(!a) return;
    const p=el(`<div class="pick ${picked.has(o.couple_id)?'on':''}" data-id="${o.couple_id}"><div class="box">✓</div><div><div class="pn">${esc(a.couple_name)}</div><div class="sub2">${esc(a.neighborhood)||''}</div></div></div>`);
    p.onclick=()=>{ picked.has(o.couple_id)?(picked.delete(o.couple_id),p.classList.remove('on')):(picked.add(o.couple_id),p.classList.add('on')); };
    list.appendChild(p); });
  body.querySelector('#submit-picks').onclick=async()=>{
    if(!r){ r={couple_id:coupleId, attended:true, likes:[]}; roster.push(r); }
    r.likes=[...picked]; r.attended=true; r.rsvp=r.rsvp||'yes';
    await DB.updateEvent(ev.id,{roster});
    const a=apps.find(x=>x.id===coupleId); if(a&&a.status!=='paired') await DB.updateApplication(coupleId,{status:'attended'});
    publicShell(el(`<div class="card done"><div class="seal">${MARK_RUST}</div><h2>Got it — thank you.</h2><p>We'll look for mutual sparks from the night. If a couple felt it both ways, we'll set the two of you a table and be in touch. ${picked.size?'':'And if nobody quite clicked this time, no worries — there’s always the next mixer.'}</p></div>`));
    window.scrollTo({top:0,behavior:'smooth'});
  };
  publicShell(body);
  window.scrollTo({top:0,behavior:'smooth'});
}

    <div class="drawer-head"><h2>${esc(ev.title)}</h2><button class="x" data-close>×</button></div>

      <div id="roster_list">${rosterRows||'<div class="sub2" style="padding:6px 0">No couples on the roster yet. Add a few to fill this mixer.</div>'}</div>
      ${ev.status==='happened'?`<div class="sub2" style="margin-top:14px;line-height:1.5">Tip: mark who attended, or send each couple their <b>Picks link</b> to note who they clicked with themselves. Mutual picks (⇄) turn green and show up under <b>Pairing</b>.</div>`:`<div class="sub2" style="margin-top:14px;line-height:1.5">Send each couple their <b>Invite link</b> to RSVP. Then read the room below.</div>`}
      ${suggestBlock(roster)}
    </div></div></div>`);

function suggestBlock(roster){
  const apps=roster.map(r=>appById(r.couple_id)).filter(Boolean);
  if(apps.length<2) return '';
  const pairs=suggestPairs(apps,4);
  if(!pairs.length) return '';
  return `<div class="sect-title">Who might click — from their intakes</div>
    <div class="sub2" style="margin:-6px 0 12px;line-height:1.5">A read from what they wrote, to help you work the room. Not a verdict — the night decides.</div>
    ${pairs.map(p=>{const t=compatTier(p.score);return `<div class="suggest-row"><div class="srtop"><div class="pn">${esc(p.a.couple_name)} <span class="vs">·</span> ${esc(p.b.couple_name)}</div><div class="score s-${t}">${tierLabel(t)}</div></div>
      <div class="sub2" style="margin-top:5px">${esc(p.reasons.slice(0,3).join(' · '))||'A few things in common'}</div></div>`;}).join('')}`;
}
function addCouplesToEvent(ev, onRoster){
  const candidates=consoleState.apps.filter(a=>!onRoster.has(a.id));
  const sel=new Set();
  const scrim=el(`<div class="modal-scrim"><div class="modal">
    <div class="modal-head"><h2>Add couples</h2><p>Invite applicants to “${esc(ev.title)}.” They'll show as <b>invited</b>.</p></div>

      <button class="btn block" id="add_go" ${candidates.length?'':'disabled'} style="margin-top:8px">Add selected</button>
    </div></div></div>`);
  document.body.appendChild(scrim);
  const list=scrim.querySelector('#cand_list');
  candidates.forEach(a=>{ const p=el(`<div class="pick" data-id="${a.id}"><div class="box">✓</div><div><div class="pn">${esc(a.couple_name)}</div><div class="sub2">${esc(a.neighborhood)||'—'} · ${cap(a.status)}</div></div></div>`);
    p.onclick=()=>{ sel.has(a.id)?(sel.delete(a.id),p.classList.remove('on')):(sel.add(a.id),p.classList.add('on')); }; list.appendChild(p); });

  scrim.querySelector('#add_go').onclick=async()=>{
    if(!sel.size){ toast('Pick at least one couple'); return; }
    const roster=arr(ev.roster);

    await DB.updateEvent(ev.id,{roster}); close(); toast('Added to the mixer'); await loadConsoleData(); openEvent(ev.id);
  };
}

/* ---- Pairing (mutual matches from events) ---- */
function drawPairing(){
  const body=$('#console-body'); body.innerHTML='';
  const happened=consoleState.events.filter(e=>e.status==='happened');
  body.appendChild(el(`<div class="panel-head"><h2>Pairing</h2><div class="count">Mutual sparks from your mixers</div></div>`));
  if(!happened.length){ body.appendChild(el(`<div class="empty"><h3>No mixers to pair from yet</h3><p>Once an event is marked “happened” and you've noted who clicked, mutual matches appear here.</p></div>`)); return; }
  happened.forEach(ev=>{
    const roster=arr(ev.roster);
    const mutuals=[];
    for(let i=0;i<roster.length;i++) for(let j=i+1;j<roster.length;j++){
      const A=roster[i],B=roster[j];
      if(A.attended&&B.attended&&arr(A.likes).includes(B.couple_id)&&arr(B.likes).includes(A.couple_id)) mutuals.push([A.couple_id,B.couple_id]);
    }
    const section=el(`<div style="margin-bottom:26px">
      <div style="font-family:var(--serif);font-size:16px;margin:0 0 12px;color:var(--ink2)">${esc(ev.title)} <span class="sub2">· ${fmtDay(ev.scheduled_at)}</span></div>
      <div id="mlist"></div></div>`);
    const ml=section.querySelector('#mlist');
    if(!mutuals.length){ ml.appendChild(el(`<div class="empty" style="padding:26px"><p>No mutual matches yet. Note who each couple clicked with in the event roster.</p></div>`)); }
    mutuals.forEach(([x,y])=>{
      const exists=consoleState.tables.find(t=>t.event_id===ev.id && arr(t.couple_ids).includes(x) && arr(t.couple_ids).includes(y));
      const A=appById(x),B=appById(y);
      const card=el(`<div class="match-card">
        <div class="pairline">${esc(nameFor(x))} <span class="vs">⇄</span> ${esc(nameFor(y))} <span class="mutual-tag">Mutual</span></div>
        <div class="why">${esc(A?A.neighborhood:'')} &amp; ${esc(B?B.neighborhood:'')} · both flagged each other after the mixer.</div>
        <div class="act">${exists?`<span class="badge b-${esc(exists.status)}">Intro ${esc(exists.status)}</span>`:'<button class="btn sm">Create the intro →</button>'}</div></div>`);
      const btn=card.querySelector('button'); if(btn) btn.onclick=()=>createIntro(ev,x,y);
      ml.appendChild(card);
    });
    body.appendChild(section);
  });
}
async function createIntro(ev,x,y){
  await DB.insertTable({ couple_ids:[x,y], event_id:ev.id, place:'', scheduled_at:null, format:'dinner', status:'proposed',
    notes:`Paired from ${ev.title}.` });
  for(const cid of [x,y]) await DB.updateApplication(cid,{status:'paired'});
  toast('Intro created — see the Board'); consoleState.tab='board'; renderConsole();
}

/* ---- Board ---- */
function drawBoard(){
  const body=$('#console-body'); const tables=consoleState.tables; body.innerHTML='';
  body.appendChild(el(`<div class="panel-head"><h2>The board</h2><div class="count">${tables.length} intro${tables.length===1?'':'s'} · run the cadence by hand</div></div>`));
  if(!tables.length){ body.appendChild(el(`<div class="empty"><h3>No intros yet</h3><p>Pair a mutual match under “Pairing” and it’ll show up here to shepherd.</p></div>`)); return; }
  const cols=[['proposed','Proposed'],['confirmed','Confirmed'],['happened','Happened'],['matched','Matched / Fizzled']];
  const board=el(`<div class="board"></div>`);
  cols.forEach(([key,label])=>{
    const inCol = key==='matched' ? tables.filter(t=>t.status==='matched'||t.status==='fizzled') : tables.filter(t=>t.status===key);
    const col=el(`<div class="col"><h3>${label}<span>${inCol.length}</span></h3></div>`);
    inCol.forEach(t=>col.appendChild(tableCard(t))); board.appendChild(col);
  });
  body.appendChild(board);
}
function tableCard(t){
  const couples=arr(t.couple_ids).map(nameFor).join('  +  ');
  const ev=t.event_id&&consoleState.events.find(e=>e.id===t.event_id);
  const idx=TABLE_FLOW.indexOf(t.status);
  const nextStatus=(idx>=0&&idx<TABLE_FLOW.length-1)?TABLE_FLOW[idx+1]:null;
  const isTerminal=t.status==='matched'||t.status==='fizzled';
  const card=el(`<div class="tcard">
    <div class="couples">${esc(couples)}</div>
    ${ev?`<div class="from">From ${esc(ev.title.split('—')[0].trim())}</div>`:''}
    <div class="plan"><b>${esc(cap(t.format||'dinner'))}</b>${t.place?' · '+esc(t.place):''}<br>${t.scheduled_at?fmtDate(t.scheduled_at):'<span style="opacity:.6">no date set</span>'}</div>
    ${t.notes?`<div class="tnote">${esc(t.notes)}</div>`:''}
    <div class="actions"></div></div>`);
  const actions=card.querySelector('.actions');
  if(nextStatus){ const b=el(`<button class="btn sm">→ ${cap(nextStatus)}</button>`); b.onclick=()=>advanceTable(t.id,nextStatus); actions.appendChild(b); }
  if(!isTerminal){ const f=el(`<button class="btn sm ghost">Fizzled</button>`); f.onclick=()=>advanceTable(t.id,'fizzled'); actions.appendChild(f); }
  const pl=el(`<button class="btn sm ghost">Plan</button>`); pl.onclick=()=>planTable(t); actions.appendChild(pl);
  const n=el(`<button class="btn sm ghost">＋ Note</button>`); n.onclick=()=>addTableNote(t); actions.appendChild(n);
  return card;
}
async function advanceTable(id,status){
  const t=consoleState.tables.find(x=>x.id===id);
  await DB.updateTable(id,{status});
  if(t){ if(status==='matched'){ for(const cid of arr(t.couple_ids)) await DB.updateApplication(cid,{status:'paired'}); }
    if(status==='fizzled'){ for(const cid of arr(t.couple_ids)){ const a=appById(cid); if(a&&a.status==='paired') await DB.updateApplication(cid,{status:'attended'}); } } }
  toast('Moved to '+status); await loadConsoleData();
}
function planTable(t){
  const scrim=el(`<div class="modal-scrim"><div class="modal">
    <div class="modal-head"><h2>Set the plan</h2><p>${esc(arr(t.couple_ids).map(nameFor).join('  +  '))}</p></div>
    <div class="modal-body">
      <div class="field"><label>Where</label><input type="text" id="p_place" value="${esc(t.place||'')}" placeholder="e.g. Lula Cafe, Logan Square" /></div>
      <div class="two"><div class="field"><label>When</label><input type="datetime-local" id="p_when" value="${t.scheduled_at?new Date(t.scheduled_at).toISOString().slice(0,16):''}" /></div>
        <div class="field"><label>Format</label><div class="chips" id="p_fmt" style="margin-top:2px"><div class="chip ${t.format!=='outing'?'on':''}" data-fmt="dinner">Dinner</div><div class="chip ${t.format==='outing'?'on':''}" data-fmt="outing">Outing</div></div></div></div>
      <div class="nav"><button class="btn ghost" data-cancel>Cancel</button><button class="btn" data-save>Save plan</button></div>
    </div></div></div>`);
  document.body.appendChild(scrim);
  let fmt=t.format||'dinner';
  scrim.querySelectorAll('#p_fmt .chip').forEach(c=>c.onclick=()=>{ scrim.querySelectorAll('#p_fmt .chip').forEach(x=>x.classList.remove('on')); c.classList.add('on'); fmt=c.dataset.fmt; });
  const close=()=>scrim.remove(); scrim.querySelector('[data-cancel]').onclick=close; scrim.onclick=(e)=>{ if(e.target===scrim) close(); };
  scrim.querySelector('[data-save]').onclick=async()=>{ const when=$('#p_when').value;
    await DB.updateTable(t.id,{place:$('#p_place').value.trim(), scheduled_at:when?new Date(when).toISOString():null, format:fmt});
    close(); toast('Plan saved'); await loadConsoleData(); };
}
function addTableNote(t){
  const scrim=el(`<div class="modal-scrim"><div class="modal">
    <div class="modal-head"><h2>Add a note</h2><p>${esc(arr(t.couple_ids).map(nameFor).join('  +  '))}</p></div>
    <div class="modal-body"><div class="field"><textarea id="m_note" placeholder="What happened, next step, how it felt…">${esc(t.notes||'')}</textarea></div>
      <div class="nav"><button class="btn ghost" data-cancel>Cancel</button><button class="btn" data-save>Save note</button></div></div></div></div>`);
  document.body.appendChild(scrim);
  const close=()=>scrim.remove(); scrim.querySelector('[data-cancel]').onclick=close; scrim.onclick=(e)=>{ if(e.target===scrim) close(); };
  scrim.querySelector('[data-save]').onclick=async()=>{ await DB.updateTable(t.id,{notes:$('#m_note').value}); close(); toast('Note saved'); await loadConsoleData(); };
}

/* ============================================================ */
setFavicon();
if(!USE_SUPABASE && DB.seedIfEmpty) DB.seedIfEmpty();
route();
</script>
